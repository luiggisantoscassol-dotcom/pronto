<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cachaça do Tio Nan</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--gold:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);--soft:#d4af37;--esm:linear-gradient(135deg,#2ecc71,#f1f2b5,#27ae60,#f1f2b5,#1e8449)}
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Montserrat',sans-serif;overflow-x:hidden}
.hero{text-align:center;padding:20px}h1{font-family:'Playfair Display';font-size:2.5rem;background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.banner{width:100%;max-width:600px;margin:0 auto;display:flex;overflow-x:auto;scroll-snap-type:x mandatory}.banner img{width:100%;flex-shrink:0;scroll-snap-align:start;border-radius:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:20px;max-width:1200px;margin:0 auto}
.card{background:#111;padding:20px;border-radius:20px;border:1px solid #222;text-align:center;display:flex;flex-direction:column;position:relative}
.img-box{height:250px;position:relative;margin-bottom:15px;overflow:hidden}.img-box img{height:100%;object-fit:contain}
.f2{position:absolute;top:0;left:50%;transform:translateX(-50%);opacity:0;transition:.3s}.card:hover .f2{opacity:1}.card:hover .f1{opacity:0}
.prod-nome{font-size:1.1rem;font-weight:800;margin:10px 0}.prod-preco{font-size:1.8rem;color:var(--soft);font-weight:900;margin-bottom:15px}
.btn-add{background:var(--gold);color:#000;border:0;padding:15px;width:100%;font-weight:900;border-radius:10px;cursor:pointer;text-transform:uppercase}
.esgotado{opacity:0.7}.faixa{position:absolute;top:50%;left:0;width:100%;background:rgba(0,0,0,0.8);color:#fff;padding:10px;font-weight:900;z-index:10;transform:translateY(-50%);border-y:1px solid var(--soft)}
.cart-btn{position:fixed;bottom:20px;right:20px;background:var(--gold);width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;z-index:100;box-shadow:0 5px 15px #000}
.badge{position:absolute;top:0;right:0;background:#f00;padding:2px 6px;border-radius:10px;font-size:10px}
.overlay{position:fixed;top:0;right:-100%;width:100%;max-width:400px;height:100%;background:#050505;z-index:200;transition:.4s;padding:20px;overflow-y:auto;touch-action:pan-y}
.overlay.active{right:0}#back{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:150;display:none;backdrop-filter:blur(5px)}
.bar-bg{width:100%;height:8px;background:#333;border-radius:10px;margin-top:10px}.bar-fill{height:100%;background:var(--gold);width:0%;transition:.5s}
.in{width:100%;background:#111;color:#fff;border:1px solid #333;padding:12px;margin:5px 0;border-radius:8px}
.item{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding:10px 0}
@keyframes fly{0%{transform:scale(1)}100%{top:var(--ty);left:var(--tx);transform:scale(0.1);opacity:0}}
@keyframes shake{0%,100%{transform:scale(1)}50%{transform:scale(1.1) rotate(5deg)}}
</style>
</head>
<body>
<div id="toast" style="position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--gold);color:#000;padding:10px 20px;border-radius:50px;font-weight:900;z-index:500;transition:.4s">ADICIONADO À SACOLA! 🥃</div>
<div class="cart-btn" onclick="tgl()"><svg width="30" viewBox="0 0 24 24"><path d="M17,6H16V5c0-2.21-1.79-4-4-4S8,2.79,8,5v1H7C5.34,6,4,7.34,4,9v10c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V9 C20,7.34,18.66,6,17,6z M10,5c0-1.1,0.9-2,2-2s2,0.9,2,2v1h-4V5z"/></svg><div class="badge" id="b">0</div></div>
<div id="back" onclick="tgl()"></div>
<aside class="overlay" id="ov">
<button onclick="tgl()" style="float:right;background:0;border:0;color:var(--soft);font-size:30px">×</button>
<h2 style="color:var(--soft);margin-bottom:20px">Sua Sacola</h2>
<div style="background:#0a0a0a;padding:15px;border-radius:10px;margin-bottom:20px;border:1px solid #222">
<div id="tf" style="font-size:11px;font-weight:800;color:var(--soft)">ADICIONE 3 GARRAFAS PARA GANHAR UM BENEFÍCIO!</div>
<div class="bar-bg"><div class="bar-fill" id="bf"></div></div>
</div>
<div id="list"></div>
<div id="f" style="display:none;margin-top:20px">
<input id="n" class="in" placeholder="Nome Completo">
<select id="m" class="in" onchange="u()"><option value="none" selected disabled>Como receber?</option><option value="t">Tele Entrega (+R$15)</option><option value="r">Retirada na Loja</option></select>
<div id="dr" style="display:none;font-size:12px;margin:10px 0">📍 Av. Bento Gonçalves, 4321, Partenon, POA</div>
<h3 id="tt" style="margin:20px 0;color:var(--soft)">Total: R$ 0,00</h3>
<button onclick="ck()" style="background:#25D366;color:#fff;width:100%;padding:15px;border-radius:10px;font-weight:900;border:0">FINALIZAR NO WHATSAPP</button>
</div>
</aside>
<div class="hero"><h1>Cachaça do <br>Tio Nan</h1></div>
<div class="banner"><img src="passo1.png"><img src="passo2.png"><img src="passo3.png"><img src="passo4.png"></div>
<div id="v" class="grid"></div>
<script>
let cart=[], SID="1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
function lp(){fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv`).then(r=>r.text()).then(t=>{
let rows=t.split('\n').slice(1),hD='',hE='';rows.forEach(r=>{let c=r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v=>v.replace(/"/g,''));
if(!c||c[3].toLowerCase()!=='sim')return;let tem=parseInt(c[4])>0;
let h=`<div class="card ${tem?'':'esgotado'}"><div class="img-box">${tem?'':'<div class="faixa">VOLTA LOGO!</div>'}<img src="${c[0]}.png" class="f1"><img src="${c[0]}-2.png" class="f2"></div><h3 class="prod-nome">${c[1]}</h3><p class="prod-preco">R$ ${c[2]}</p>${tem?`<button class="btn-add" onclick="add('${c[0]}','${c[1]}','${c[2]}',this)">Adicionar à sacola</button>`:`<button class="btn-add" disabled>Esgotado</button>`}</div>`;
if(tem)hD+=h;else hE+=h});document.getElementById('v').innerHTML=hD+hE})}
function tgl(){let o=document.getElementById('ov');o.classList.toggle('active');document.getElementById('back').style.display=o.classList.contains('active')?'block':'none'}
function add(id,n,p,btn){let i=cart.find(x=>x.id===id);if(i)i.q++;else cart.push({id,n,p:parseFloat(p.replace(',','.')),q:1});u();
let t=document.getElementById('toast');t.style.transform='translateX(-50%) translateY(0)';setTimeout(()=>t.style.transform='translateX(-50%) translateY(-100px)',2000);
document.querySelector('.cart-btn').style.animation='shake .5s';setTimeout(()=>document.querySelector('.cart-btn').style.animation='',500)}
function u(){let q=cart.reduce((a,b)=>a+b.q,0),m=document.getElementById('m').value,f=document.getElementById('bf'),tf=document.getElementById('tf');
document.getElementById('b').innerText=q;f.style.width=Math.min((q/3)*100,100)+'%';
if(m==='r'){f.style.background="var(--esm)";tf.innerText=q>=3?"DESCONTO ATIVADO! 💰":"FALTAM "+(3-q)+" P/ R$15 OFF";}
else{f.style.background="var(--gold)";tf.innerText=q>=3?"FRETE GRÁTIS! 🚚":"FALTAM "+(3-q)+" P/ FRETE GRÁTIS";}
document.getElementById('list').innerHTML=cart.map(i=>`<div class="item"><span>${i.n} x${i.q}</span><span>R$ ${(i.p*i.q).toFixed(2)}</span></div>`).join('');
let tot=cart.reduce((a,b)=>a+(b.p*b.q),0);if(m==='t'&&q<3)tot+=15;if(m==='r'&&q>=3)tot-=15;
document.getElementById('tt').innerText=`Total: R$ ${tot.toFixed(2).replace('.',',')}`;
document.getElementById('f').style.display=cart.length?'block':'none';document.getElementById('dr').style.display=m==='r'?'block':'none'}
function ck(){let n=document.getElementById('n').value;if(!n)return alert("Diga seu nome!");window.open(`https://wa.me/5551989067003?text=*PEDIDO TIO NAN*%0A👤 ${n}%0A${document.getElementById('tt').innerText}`)}
lp();
</script></body></html>
