<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Cachaça do Tio Nan - Loja Oficial</title>

    

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />



    <style>

        :root {

            --bg-dark: #000000; 

            --bg-card: #111111;

            --gold-metallic: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);

            --gold-soft: #d4af37; --text-light: #f5f5f5;

            --font-premium: 'Playfair Display', serif; --font-body: 'Montserrat', sans-serif;

        }



        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

        

        html, body { 

            width: 100%; 

            overflow-x: hidden; 

            background-color: var(--bg-dark); 

            color: var(--text-light); 

            font-family: var(--font-body); 

        }



        /* TRAVA DE ROLAGEM DO FUNDO */

        body.stop-scroll {

            overflow: hidden !important;

            height: 100vh !important;

        }



        #loader-wrapper {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: #000; z-index: 999999;

            display: flex; flex-direction: column; justify-content: center; align-items: center;

            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;

            overflow: hidden;

        }

        #loader-wrapper.hidden { opacity: 0; visibility: hidden; }



        #loading-video { width: 100%; max-width: 400px; height: auto; border: none; outline: none; }



        .loading-text {

            color: var(--gold-soft); margin-top: 25px; font-weight: 900;

            font-family: var(--font-body); text-transform: uppercase; letter-spacing: 3px;

            animation: pulseText 1.5s ease-in-out infinite alternate;

            font-size: 0.75rem;

        }



        @keyframes pulseText { 0% { opacity: 0.4; } 100% { opacity: 1; } }



        .garrafa-voando {

            position: fixed; z-index: 9999; pointer-events: none;

            transition: all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045);

            object-fit: contain; filter: drop-shadow(0 5px 15px rgba(212, 175, 55, 0.6));

        }



        #toast-notificacao {

            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);

            background: var(--gold-metallic); color: #000; padding: 12px 25px; border-radius: 50px;

            font-weight: 900; font-size: 0.9rem; z-index: 5000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-transform: uppercase; white-space: nowrap;

        }

        #toast-notificacao.show { transform: translateX(-50%) translateY(0px); }



        #container-frete { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #222; }

        #texto-frete { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--gold-soft); letter-spacing: 1px; }

        .barra-progresso-bg { width: 100%; height: 8px; background: #333; border-radius: 10px; overflow: hidden; }

        .barra-progresso-fill { width: 0%; height: 100%; background: var(--gold-metallic); transition: width 0.5s ease-in-out; }



        .swiper-hero { width: 100%; max-width: 700px; padding: 20px 0; margin: 0 auto; background: transparent; }

        .swiper-hero img { width: 95%; max-height: 350px; border-radius: 15px; object-fit: contain; display: block; margin: 0 auto; background: transparent; }



        .hero-section { width: 100%; text-align: center; padding: 30px 15px; }

        .hero-section h1 { font-family: var(--font-premium); font-size: clamp(2.2rem, 8vw, 3.2rem); background: var(--gold-metallic); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; font-weight: 700; }



        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 5% 120px; max-width: 1100px; margin: 0 auto; }

        .card-produto { background: var(--bg-card); padding: 25px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; position: relative; transition: 0.3s; overflow: hidden; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        

        .img-wrapper { width: 100%; height: 280px; margin-bottom: 15px; position: relative; overflow: hidden; }

        .card-produto.esgotado-card .img-wrapper { opacity: 0.7; } 



        .faixa-esgotado-clean {

            position: absolute; top: 50%; left: 0; width: 100%; 

            background: rgba(0, 0, 0, 0.6); color: #fff;

            padding: 12px 0; font-family: var(--font-body); font-weight: 900; font-size: 0.8rem;

            text-transform: uppercase; letter-spacing: 2px; z-index: 20; transform: translateY(-50%);

            border-top: 1px solid rgba(212, 175, 55, 0.5); border-bottom: 1px solid rgba(212, 175, 55, 0.5); 

            pointer-events: none; backdrop-filter: blur(4px);

        }



        .cart-toggle { position: fixed; bottom: 30px; right: 25px; background: var(--gold-metallic); width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2001; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .cart-count { position: absolute; top: 0; right: 0; background: #ff4444; color: white; min-width: 22px; height: 22px; border-radius: 11px; font-size: 0.8rem; font-weight: bold; display: flex; justify-content: center; align-items: center; border: 2px solid #000; }

        

        /* SACOLA COM BLOQUEIO DE OVERFLOW */

        .cart-overlay { 

            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; 

            background: var(--bg-card); z-index: 4000; transition: 0.4s ease; padding: 30px; 

            overflow-y: auto; text-align: center;

            overscroll-behavior: contain;

        }

        .cart-overlay.active { right: 0; }

        

        .cart-input { width: 100%; background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 16px !important; outline: none; }

        

        .btn-adicionar { background: var(--gold-metallic); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 10px; text-transform: uppercase; font-size: 0.85rem; position: relative; z-index: 5; }

        .preco { font-family: var(--font-body); font-size: 1.8rem; color: var(--gold-soft); margin-bottom: 20px; display: block; font-weight: 900; }

        .prod-nome { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #fff; }

        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; text-align: left; }

        .qty-btn { background: #222; color: var(--gold-soft); border: 1px solid #333; width: 35px; height: 35px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        .btn-continuar { width: 100%; margin-top: 15px; background: none; border: 1px solid #444; color: #888; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }



        @keyframes chacoalharRapido { 0%, 100% { transform: scale(1); } 20%, 60% { transform: scale(1.15) rotate(5deg); } 40%, 80% { transform: scale(1.15) rotate(-5deg); } }

    </style>

</head>

<body>



    <div id="loader-wrapper">

        <video id="loading-video" autoplay loop muted playsinline>

            <source src="load.mp4" type="video/mp4">

        </video>

        <div class="loading-text">Servindo a verdadeira...</div>

    </div>



    <div id="toast-notificacao">Adicionado à sacola! 🥃</div>



    <div class="cart-toggle" onclick="toggleCart()" id="cart-btn">

        <svg viewBox="0 0 24 24" style="width:30px; fill:#000;"><path d="M17,6H16V5c0-2.21-1.79-4-4-4S8,2.79,8,5v1H7C5.34,6,4,7.34,4,9v10c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V9 C20,7.34,18.66,6,17,6z M10,5c0-1.1,0.9-2,2-2s2,0.9,2,2v1h-4V5z"/></svg>

        <div class="cart-count" id="badge">0</div>

    </div>

    

    <div class="backdrop" id="backdrop" onclick="toggleCart()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none;"></div>



    <aside class="cart-overlay" id="cart-overlay">

        <button onclick="toggleCart()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--gold-soft); font-size:2.5rem; cursor:pointer;">×</button>

        <h3 style="color:var(--gold-soft); font-size:1.8rem; margin-bottom:30px; font-family: var(--font-premium);">Sua Sacola</h3>

        

        <div id="container-frete">

            <div id="texto-frete">Adicione 3 garrafas para ganhar um benefício!</div>

            <div class="barra-progresso-bg"><div class="barra-progresso-fill" id="barra-frete"></div></div>

        </div>



        <div id="cart-items"></div>

        

        <div id="checkout-form" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px;">

            <input type="text" id="cliente-nome" class="cart-input" placeholder="Nome Completo">

            <select id="metodo-entrega" class="cart-input" onchange="updateCart()">

                <option value="none" selected disabled>Como quer receber?</option>

                <option value="tele">Tele Entrega (+ R$ 15,00)</option>

                <option value="retirada">Retirada na Loja</option>

            </select>



            <div id="bloco-retirada" style="display:none; background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold-soft); padding: 15px; border-radius: 8px; margin-bottom: 15px; color: var(--gold-soft); font-size: 0.9rem; line-height: 1.4; text-align: left;">

                <strong>📍 Endereço para busca:</strong><br>

                Av. Bento Gonçalves, 4321 - Partenon

            </div>



            <div id="bloco-endereco" style="display:none;">

                <input type="text" id="cep" class="cart-input" placeholder="CEP" onblur="buscaCEP()" maxlength="9">

                <input type="text" id="rua" class="cart-input" placeholder="Rua">

                <div style="display:flex; gap:10px;"><input type="text" id="numero" class="cart-input" placeholder="Nº" style="width:35%;"><input type="text" id="apto" class="cart-input" placeholder="Apto" style="width:65%;"></div>

                <input type="text" id="bairro" class="cart-input" placeholder="Bairro">

                <input type="text" id="cidade" class="cart-input" placeholder="Cidade" readonly>

            </div>



            <select id="metodo-pagamento" class="cart-input">

                <option value="Pix">Pix</option>

                <option value="Dinheiro">Dinheiro</option>

                <option value="Cartão">Cartão</option>

            </select>



            <h3 id="cart-total-display" style="margin:25px 0; color:var(--gold-soft); font-size: 1.8rem; font-weight: 900;">Total: R$ 0,00</h3>

            <button onclick="checkout()" style="background:#25D366; color:white; border:none; width:100%; padding:20px; font-weight:900; border-radius:12px; cursor:pointer; text-transform: uppercase;">FINALIZAR NO WHATSAPP</button>

            <button class="btn-continuar" onclick="toggleCart()">Continuar Comprando</button>

        </div>

    </aside>



    <main>

        <div class="swiper swiper-hero">

            <div class="swiper-wrapper">

                <div class="swiper-slide"><img src="passo1.png"></div>

                <div class="swiper-slide"><img src="passo2.png"></div>

            </div>

            <div class="swiper-pagination"></div>

        </div>

        <section class="hero-section"><h1>Cachaça do Tio Nan</h1></section>

        <div id="vitrine" class="produtos-grid"></div>

    </main>



    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>

        const urlWebhook = "https://script.google.com/macros/s/AKfycbzdKBuX0YgzgzDNIFtKcYhpVT2_ZOL-jcAVsNJwFjRQcsxw_n7QasraXeIuZiBc44lO/exec";

        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";

        

        new Swiper('.swiper-hero', { loop: true, autoplay: { delay: 5000 } });

        let cart = [];



        function toggleCart() {

            const overlay = document.getElementById('cart-overlay');

            const backdrop = document.getElementById('backdrop');

            overlay.classList.toggle('active');

            if(overlay.classList.contains('active')) {

                backdrop.style.display = 'block';

                document.body.classList.add('stop-scroll');

            } else {

                backdrop.style.display = 'none';

                document.body.classList.remove('stop-scroll');

            }

        }



        async function loadProducts() {

            try {

                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);

                const text = await res.text();

                const rows = text.split('\n').slice(1);

                let htmlDisp = ''; let htmlEsg = '';

                

                rows.forEach(row => {

                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v ? v.replace(/^"|"$/g, '').trim() : "");

                    if(!c[1] || c[1] === "EXCLUIDO") return;

                    const id = c[0], nome = c[1], foto = c[2] || "https://via.placeholder.com/300", 

                          preco = parseFloat(c[4].replace(',', '.')), estoque = parseInt(c[5]) || 0, custo = parseFloat(c[6].replace(',', '.')) || 0;

                    

                    const card = `<div class="card-produto ${estoque > 0 ? '' : 'esgotado-card'}" id="card-${id}"><div class="img-wrapper">${estoque > 0 ? '' : '<div class="faixa-esgotado-clean">Volta Logo!</div>'}<img src="${foto}" style="max-height:260px; width:100%; object-fit:contain;"></div><h3 class="prod-nome">${nome}</h3><span class="preco">R$ ${preco.toFixed(2).replace('.',',')}</span>${estoque > 0 ? `<button class="btn-adicionar" onclick="add('${id}','${nome}',${preco},${custo})">Adicionar à sacola</button>` : `<button class="btn-adicionar" disabled>Esgotado</button>`}</div>`;

                    if (estoque > 0) htmlDisp += card; else htmlEsg += card;

                });

                document.getElementById('vitrine').innerHTML = htmlDisp + htmlEsg;

            } catch (e) { console.error(e); }

            finally { setTimeout(() => document.getElementById('loader-wrapper').classList.add('hidden'), 1500); }

        }



        function add(id, name, price, cost) {

            const item = cart.find(i => i.id === id);

            if(item) item.qtd++; else cart.push({id, name, price, cost, qtd:1});

            updateCart();

            const toast = document.getElementById('toast-notificacao'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000);

        }



        function updateCart() {

            const itemsCont = document.getElementById('cart-items');

            const totalGarrafas = cart.reduce((acc, i) => acc + i.qtd, 0);

            const barra = document.getElementById('barra-frete');

            const entrega = document.getElementById('metodo-entrega').value;



            barra.style.width = Math.min((totalGarrafas / 3) * 100, 100) + "%";

            document.getElementById('checkout-form').style.display = cart.length > 0 ? 'block' : 'none';

            document.getElementById('bloco-retirada').style.display = (entrega === 'retirada') ? 'block' : 'none';

            document.getElementById('bloco-endereco').style.display = (entrega === 'tele') ? 'block' : 'none';



            itemsCont.innerHTML = cart.map(i => `<div class="cart-item-row"><div><b>${i.name}</b><br>R$ ${(i.price * i.qtd).toFixed(2)}</div><div style="display:flex; gap:10px;"><button class="qty-btn" onclick="changeQty('${i.id}', -1)">-</button><span>${i.qtd}</span><button class="qty-btn" onclick="changeQty('${i.id}', 1)">+</button></div></div>`).join('');

            

            document.getElementById('badge').innerText = totalGarrafas;

            let total = cart.reduce((acc, i) => acc + (i.price * i.qtd), 0);

            if (entrega === 'tele' && totalGarrafas < 3) total += 15;

            document.getElementById('cart-total-display').innerText = `Total: R$ ${total.toFixed(2)}`;

        }



        function changeQty(id, delta) { const item = cart.find(i => i.id === id); if(item) { item.qtd += delta; if(item.qtd <= 0) cart = cart.filter(i => i.id !== id); updateCart(); } }



        function checkout() {

            const nome = document.getElementById('cliente-nome').value;

            const entrega = document.getElementById('metodo-entrega').value;

            if(!nome || entrega === "none") return alert("Digite seu nome e escolha o método de entrega!");



            // CÁLCULO DOS VALORES MATEMÁTICOS (CORRIGE O BUG DOS 0 REAIS)

            const totalG = cart.reduce((acc, i) => acc + i.qtd, 0);

            let valorProdutos = cart.reduce((acc, i) => acc + (i.price * i.qtd), 0);

            let custoProdutos = cart.reduce((acc, i) => acc + (i.cost * i.qtd), 0);

            if (entrega === 'tele' && totalG < 3) valorProdutos += 15;



            const itensTxt = cart.map(i => `${i.name} (x${i.qtd})`).join(', ');

            let endereco = "Retirada";

            if(entrega === 'tele') {

                endereco = `${document.getElementById('rua').value}, ${document.getElementById('numero').value} - ${document.getElementById('bairro').value}`;

            }



            const dados = {

                data: new Date().toLocaleString('pt-BR'),

                cliente: nome,

                itens: itensTxt,

                total: valorProdutos.toFixed(2), // Envia o número puro para a planilha

                custo: custoProdutos.toFixed(2),

                pagamento: document.getElementById('metodo-pagamento').value,

                endereco: endereco,

                status: "Novo Pedido"

            };



            // ENVIO PARA O ADMIN

            fetch(urlWebhook, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });



            // ABERTURA DO WHATSAPP

            window.open(`https://wa.me/5551989067003?text=${encodeURIComponent("*PEDIDO TIO NAN*\n👤 "+nome+"\n📦 "+itensTxt+"\n💰 R$ "+valorProdutos.toFixed(2))}`);

        }



        loadProducts();

    </script>

</body>

</html>
