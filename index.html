<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cachaça do Tio Nan - Loja Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-dark: #000000; 
            --bg-card: #111111;
            --gold-metallic: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-soft: #d4af37; --text-light: #f5f5f5;
            --font-premium: 'Playfair Display', serif; --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; background-color: var(--bg-dark); color: var(--text-light); font-family: var(--font-body); }

        /* TOAST */
        #toast-notificacao {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--gold-metallic); color: #000; padding: 12px 25px; border-radius: 50px;
            font-weight: 900; font-size: 0.9rem; z-index: 5000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-transform: uppercase; white-space: nowrap;
        }
        #toast-notificacao.show { transform: translateX(-50%) translateY(0px); }

        .swiper-hero { width: 100%; max-width: 700px; padding: 20px 0; margin: 0 auto; background: transparent; }
        .swiper-hero img { width: 95%; max-height: 350px; border-radius: 15px; object-fit: contain; display: block; margin: 0 auto; background: transparent; }
        .swiper-pagination-bullet { background: #fff !important; opacity: 0.5; }
        .swiper-pagination-bullet-active { background: var(--gold-soft) !important; opacity: 1 !important; }

        .hero-section { width: 100%; text-align: center; padding: 30px 15px; }
        .hero-section h1 { font-family: var(--font-premium); font-size: clamp(2.2rem, 8vw, 3.2rem); background: var(--gold-metallic); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; font-weight: 700; }

        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 5% 120px; max-width: 1100px; margin: 0 auto; }
        .card-produto { background: var(--bg-card); padding: 25px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; position: relative; transition: 0.3s; overflow: hidden; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .img-wrapper { width: 100%; height: 280px; margin-bottom: 15px; position: relative; overflow: hidden; }

        /* ESGOTADOS */
        .card-produto.esgotado-card .img-wrapper { opacity: 0.7; } 
        .faixa-esgotado-clean {
            position: absolute; top: 50%; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.6); color: #fff;
            padding: 12px 0; font-family: var(--font-body); font-weight: 900; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px; z-index: 20; transform: translateY(-50%);
            border-top: 1px solid rgba(212, 175, 55, 0.5); border-bottom: 1px solid rgba(212, 175, 55, 0.5); 
            pointer-events: none; backdrop-filter: blur(4px);
        }

        /* SACOLA */
        .cart-toggle { position: fixed; bottom: 30px; right: 25px; background: var(--gold-metallic); width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2001; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .cart-count { position: absolute; top: 0; right: 0; background: #ff4444; color: white; min-width: 22px; height: 22px; border-radius: 11px; font-size: 0.8rem; font-weight: bold; display: flex; justify-content: center; align-items: center; border: 2px solid #000; }
        .cart-overlay { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: var(--bg-card); z-index: 4000; transition: 0.4s ease; padding: 30px; overflow-y: auto; text-align: center; }
        .cart-overlay.active { right: 0; }
        .cart-input { width: 100%; background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 1rem; outline: none; }
        .btn-continuar { width: 100%; margin-top: 10px; background: none; border: 1px solid #444; color: #888; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        
        #bloco-retirada { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold-soft); padding: 15px; border-radius: 8px; margin-bottom: 15px; color: var(--gold-soft); font-size: 0.9rem; line-height: 1.4; text-align: left; }
        #bloco-retirada a { color: var(--gold-soft); text-decoration: underline; font-weight: bold; }

        .btn-adicionar { background: var(--gold-metallic); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; cursor: pointer; border-radius: 10px; text-transform: uppercase; font-size: 0.85rem; }
        .btn-adicionar:disabled { background: #1a1a1a !important; color: #444 !important; border: 1px solid #333; cursor: not-allowed; }
        .preco { font-family: var(--font-body); font-size: 1.8rem; color: var(--gold-soft); margin-bottom: 20px; display: block; font-weight: 900; }
        .prod-nome { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #fff; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; text-align: left; }
        .qty-btn { background: #222; color: var(--gold-soft); border: 1px solid #333; width: 35px; height: 35px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        
        /* AVISO DE REGIÃO INDISPONÍVEL */
        #aviso-regiao { color: #ff4444; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; display: none; text-transform: uppercase; }

        @media (min-width: 1024px) {
            .swiper-produto { display: none !important; }
            .desktop-only-images { display: block; width: 100%; height: 100%; position: relative; cursor: pointer; }
            .foto-1 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: auto; height: 260px; z-index: 2; transition: opacity 0.3s ease; }
            .foto-2 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: auto; height: 260px; z-index: 1; opacity: 0; transition: opacity 0.3s ease; }
            .card-produto:not(.esgotado-card):hover .foto-1 { opacity: 0; }
            .card-produto:not(.esgotado-card):hover .foto-2 { opacity: 1; }
        }

        @media (max-width: 1023px) {
            .desktop-only-images { display: none; }
            .swiper-produto { display: block; width: 100%; height: 280px; }
            .swiper-produto img { max-height: 260px; max-width: 100%; object-fit: contain; }
        }
        
        @keyframes chacoalharRapido { 0%, 100% { transform: scale(1); } 20%, 60% { transform: scale(1.2) rotate(10deg); } 40%, 80% { transform: scale(1.2) rotate(-10deg); } }
    </style>
</head>
<body>

    <div id="toast-notificacao">Adicionado à sacola! 🥃</div>

    <div class="cart-toggle" onclick="toggleCart()" id="cart-btn">
        <svg viewBox="0 0 24 24" style="width:30px; fill:#000;"><path d="M17,6H16V5c0-2.21-1.79-4-4-4S8,2.79,8,5v1H7C5.34,6,4,7.34,4,9v10c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V9 C20,7.34,18.66,6,17,6z M10,5c0-1.1,0.9-2,2-2s2,0.9,2,2v1h-4V5z"/></svg>
        <div class="cart-count" id="badge">0</div>
    </div>
    
    <div class="backdrop" id="backdrop" onclick="toggleCart()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none;"></div>

    <aside class="cart-overlay" id="cart-overlay">
        <button onclick="toggleCart()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--gold-soft); font-size:2.5rem; cursor:pointer;">×</button>
        <h3 style="color:var(--gold-soft); font-size:1.8rem; margin-bottom:30px; font-family: var(--font-premium);">Sua Sacola</h3>
        
        <div id="cart-items"></div>
        
        <div id="checkout-form" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <input type="text" id="cliente-nome" class="cart-input" placeholder="Nome Completo">
            <select id="metodo-entrega" class="cart-input" onchange="updateCart()">
                <option value="none" selected disabled>Como quer receber?</option>
                <option value="tele">Tele Entrega (+ R$ 15,00)</option>
                <option value="retirada">Retirada na Loja</option>
            </select>

            <div id="bloco-retirada" style="display:none;">
                <strong>📍 Endereço para busca:</strong><br>
                <a href="http://googleusercontent.com/maps.google.com/Av. Bento Gonçalves, 4321, Porto Alegre" target="_blank">
                    Av. Bento Gonçalves, 4321<br>
                    Partenon, Porto Alegre - RS
                </a>
                <br><small>(Clique no endereço para abrir o Maps)</small>
            </div>

            <div id="bloco-endereco" style="display:none;">
                <input type="text" id="cep" class="cart-input" placeholder="CEP" onblur="buscaCEP()" maxlength="9" oninput="mascaraCEP(this)">
                <input type="text" id="rua" class="cart-input" placeholder="Rua">
                <div style="display:flex; gap:10px;"><input type="text" id="numero" class="cart-input" placeholder="Nº" style="width:35%;"><input type="text" id="apto" class="cart-input" placeholder="Apto (Opcional)" style="width:65%;"></div>
                <input type="text" id="bairro" class="cart-input" placeholder="Bairro">
                <input type="hidden" id="cidade">
                <input type="hidden" id="estado">
            </div>

            <select id="metodo-pagamento" class="cart-input">
                <option value="none" selected disabled>Forma de Pagamento?</option>
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Débito">Débito</option>
                <option value="Crédito">Crédito</option>
            </select>

            <div id="aviso-regiao">Ops! Ainda não entregamos nesta cidade. 💔</div>

            <h3 id="cart-total-display" style="margin:25px 0; color:var(--gold-soft); font-size: 1.8rem; font-weight: 900;">Total: R$ 0,00</h3>
            
            <button id="btn-finalizar" onclick="checkout()" style="background:#25D366; color:white; border:none; width:100%; padding:20px; font-weight:900; border-radius:12px; cursor:pointer; text-transform: uppercase;">FINALIZAR NO WHATSAPP</button>
            <button class="btn-continuar" onclick="toggleCart()">Continuar Comprando</button>
        </div>
    </aside>

    <main>
        <div class="swiper swiper-hero">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="passo1.png"></div>
                <div class="swiper-slide"><img src="passo2.png"></div>
                <div class="swiper-slide"><img src="passo3.png"></div>
                <div class="swiper-slide"><img src="passo4.png"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <section class="hero-section"><h1>Cachaça do Tio Nan</h1></section>
        <div id="vitrine" class="produtos-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const urlWebhook = "https://script.google.com/macros/s/AKfycbwu4OWF-2JEsWZl3fw7qpevre0rSeN7hGUJZUPWwx-Jt50kzJ7QinlfOepG5ARQC5WG/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        const CIDADES_PERMITIDAS = ["Porto Alegre", "Montenegro", "Viamão", "Canoas"];
        
        new Swiper('.swiper-hero', { loop: true, pagination: { el: '.swiper-pagination', clickable: true }, autoplay: { delay: 5000 } });
        let cart = [];

        function mascaraCEP(t) {
            let v = t.value.replace(/\D/g, "");
            if (v.length > 5) v = v.substring(0, 5) + "-" + v.substring(5, 8);
            t.value = v;
        }

        async function buscaCEP() {
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const d = await res.json();
                if(!d.erro) { 
                    document.getElementById('rua').value = d.logradouro; 
                    document.getElementById('bairro').value = d.bairro;
                    document.getElementById('cidade').value = d.localidade;
                    document.getElementById('estado').value = d.uf;
                    validarCidade(d.localidade);
                }
            }
        }

        function validarCidade(cidade) {
            const btn = document.getElementById('btn-finalizar');
            const aviso = document.getElementById('aviso-regiao');
            const entrega = document.getElementById('metodo-entrega').value;

            // Só valida se for Tele Entrega
            if (entrega === 'tele') {
                const permitida = CIDADES_PERMITIDAS.some(c => c.toLowerCase() === cidade.toLowerCase());
                if (!permitida) {
                    btn.disabled = true;
                    btn.style.background = "#333";
                    btn.style.opacity = "0.5";
                    btn.style.cursor = "not-allowed";
                    aviso.style.display = "block";
                } else {
                    liberarBotao();
                }
            } else {
                liberarBotao();
            }
        }

        function liberarBotao() {
            const btn = document.getElementById('btn-finalizar');
            const aviso = document.getElementById('aviso-regiao');
            btn.disabled = false;
            btn.style.background = "#25D366";
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            aviso.style.display = "none";
        }

        async function loadProducts() {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            let disponiveisHTML = '';
            let esgotadosHTML = '';
            
            rows.forEach(row => {
                const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(c[3].toLowerCase() !== 'sim') return;
                const estoque = parseInt(c[4]) || 0;
                const temEstoque = estoque > 0;
                const precoFormatado = "R$ " + parseFloat(c[2].replace(',', '.')).toFixed(2).replace('.', ',');
                
                const cardHTML = `
                    <div class="card-produto ${temEstoque ? '' : 'esgotado-card'}">
                        <div class="img-wrapper">
                            ${temEstoque ? '' : '<div class="faixa-esgotado-clean">Volta Logo!</div>'}
                            <div class="desktop-only-images"><img src="${c[0]}.png" class="foto-1"><img src="${c[0]}-2.png" class="foto-2" onerror="this.style.display='none'"></div>
                            <div class="swiper swiper-produto">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide"><img src="${c[0]}.png"></div>
                                    <div class="swiper-slide"><img src="${c[0]}-2.png" onerror="this.parentElement.remove()"></div>
                                </div>
                                <div class="swiper-pagination"></div>
                            </div>
                        </div>
                        <div><h3 class="prod-nome">${c[1]}</h3><span class="preco">${precoFormatado}</span></div>
                        ${temEstoque ? `<button class="btn-adicionar" onclick="add('${c[0]}','${c[1]}',${parseFloat(c[2].replace(',','.'))})">Adicionar à sacola</button>` : `<button class="btn-adicionar" disabled>Esgotado</button>`}
                    </div>`;

                if (temEstoque) disponiveisHTML += cardHTML; else esgotadosHTML += cardHTML;
            });
            document.getElementById('vitrine').innerHTML = disponiveisHTML + esgotadosHTML;
            if (window.innerWidth < 1024) { document.querySelectorAll('.swiper-produto').forEach(el => { new Swiper(el, { pagination: { el: el.querySelector('.swiper-pagination'), clickable: true } }); }); }
        }

        function toggleCart() { document.getElementById('cart-overlay').classList.toggle('active'); document.getElementById('backdrop').style.display = document.getElementById('cart-overlay').classList.contains('active') ? 'block' : 'none'; }
        
        function add(id, name, price) {
            const item = cart.find(i => i.id === id);
            if(item) item.qtd++; else cart.push({id, name, price, qtd:1});
            updateCart();
            const toast = document.getElementById('toast-notificacao'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000);
            const btn = document.getElementById('cart-btn'); btn.style.animation = 'none'; void btn.offsetWidth; btn.style.animation = 'chacoalharRapido 0.6s ease-in-out';
        }

        function updateCart() {
            const itemsCont = document.getElementById('cart-items');
            if (cart.length === 0) { 
                itemsCont.innerHTML = `<div style="padding:40px 10px; opacity:0.8;"><p>Sua sacola está vazia.</p></div>`; 
                document.getElementById('checkout-form').style.display = 'none'; 
                document.getElementById('badge').innerText = 0; return; 
            }
            document.getElementById('checkout-form').style.display = 'block';
            const entrega = document.getElementById('metodo-entrega').value;
            document.getElementById('bloco-endereco').style.display = (entrega === 'tele') ? 'block' : 'none';
            document.getElementById('bloco-retirada').style.display = (entrega === 'retirada') ? 'block' : 'none';
            
            // Se mudar para retirada, libera o botão ignorando a cidade
            if (entrega === 'retirada') liberarBotao();
            else if (entrega === 'tele' && document.getElementById('cidade').value) validarCidade(document.getElementById('cidade').value);

            itemsCont.innerHTML = cart.map(i => `<div class="cart-item-row"><div><b>${i.name}</b><br><small>R$ ${(i.price * i.qtd).toFixed(2).replace('.', ',')}</small></div><div style="display:flex; align-items:center; gap:10px;"><button class="qty-btn" onclick="changeQty('${i.id}', -1)">-</button><span style="font-weight:bold;">${i.qtd}</span><button class="qty-btn" onclick="changeQty('${i.id}', 1)">+</button></div></div>`).join('');
            document.getElementById('badge').innerText = cart.reduce((acc, i) => acc + i.qtd, 0);
            let total = cart.reduce((acc, i) => acc + (i.price * i.qtd), 0);
            if(entrega === 'tele') total += 15;
            document.getElementById('cart-total-display').innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
        }

        function changeQty(id, delta) { const item = cart.find(i => i.id === id); if (item) { item.qtd += delta; if (item.qtd <= 0) cart = cart.filter(i => i.id !== id); updateCart(); } }

        async function checkout() {
            const nome = document.getElementById('cliente-nome').value;
            const entrega = document.getElementById('metodo-entrega').value;
            const pag = document.getElementById('metodo-pagamento').value;
            if(!nome || entrega === "none" || pag === "none") return alert("Preencha todos os dados!");
            
            let enderecoComp = "";
            if (entrega === 'tele') {
                const rua = document.getElementById('rua').value;
                const num = document.getElementById('numero').value;
                const apto = document.getElementById('apto').value;
                const bairro = document.getElementById('bairro').value;
                const cidade = document.getElementById('cidade').value;
                enderecoComp = `${rua}, ${num}${apto ? ' (Apto/Casa: ' + apto + ')' : ''} - ${bairro}, ${cidade}`;
            } else {
                enderecoComp = "Retirada na Loja (Av. Bento Gonçalves, 4321)";
            }

            const dados = { data: new Date().toLocaleString('pt-BR'), cliente: nome, itens: cart.map(i => `${i.name} (x${i.qtd})`).join(', '), total: document.getElementById('cart-total-display').innerText, pagamento: pag, status: "Novo Pedido", endereco: enderecoComp };
            fetch(urlWebhook, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
            window.open(`https://wa.me/5551989067003?text=${encodeURIComponent("*PEDIDO TIO NAN*\n👤 "+nome+"\n📦 "+dados.itens+"\n📍 "+enderecoComp+"\n💰 "+document.getElementById('cart-total-display').innerText)}`);
        }
        
        loadProducts();
        updateCart();
    </script>
</body>
</html>
