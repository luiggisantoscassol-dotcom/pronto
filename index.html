<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cachaça do Tio Nan - Loja Oficial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --bg-dark: #000000; 
            --bg-card: #111111;
            --gold-metallic: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-soft: #d4af37; --text-light: #f5f5f5;
            --font-premium: 'Playfair Display', serif; --font-body: 'Montserrat', sans-serif;
            --green-esmeralda: linear-gradient(135deg, #2ecc71, #f1f2b5, #27ae60, #f1f2b5, #1e8449);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; background-color: var(--bg-dark); color: var(--text-light); font-family: var(--font-body); }

        /* TÍTULO INICIAL DOURADO E CENTRALIZADO */
        .hero-section { width: 100%; text-align: center; padding: 30px 15px; }
        .hero-section h1 { font-family: var(--font-premium); font-size: clamp(2.2rem, 8vw, 3.2rem); background: var(--gold-metallic); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; font-weight: 700; display: inline-block; }

        /* ANIMAÇÃO DOURADA */
        .garrafa-voando { position: fixed; z-index: 9999; pointer-events: none; transition: all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); object-fit: contain; filter: drop-shadow(0 5px 15px rgba(212, 175, 55, 0.8)); }

        /* BOLINHAS DOURADAS */
        .swiper-pagination-bullet-active { background: var(--gold-soft) !important; }

        #toast-notificacao { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--gold-metallic); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 900; z-index: 5000; transition: 0.5s; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #toast-notificacao.show { transform: translateX(-50%) translateY(0px); }

        /* BARRA DE PROGRESSO */
        #container-frete { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #222; }
        #texto-frete { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--gold-soft); letter-spacing: 1px; }
        .barra-progresso-bg { width: 100%; height: 8px; background: #333; border-radius: 10px; overflow: hidden; }
        .barra-progresso-fill { width: 0%; height: 100%; background: var(--gold-metallic); transition: width 0.5s ease-in-out, background 0.3s; }
        .barra-verde { background: var(--green-esmeralda) !important; }

        .swiper-hero { width: 100%; max-width: 700px; padding: 20px 0; margin: 0 auto; background: transparent; }
        .swiper-hero img { width: 95%; max-height: 350px; border-radius: 15px; object-fit: contain; display: block; margin: 0 auto; }

        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 5% 120px; max-width: 1100px; margin: 0 auto; }
        .card-produto { background: var(--bg-card); padding: 25px; text-align: center; border-radius: 20px; border: 1px solid #1a1a1a; position: relative; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
        .img-wrapper { width: 100%; height: 280px; margin-bottom: 15px; position: relative; }

        .card-produto.esgotado-card .img-wrapper { opacity: 0.7; }
        .faixa-esgotado-clean { position: absolute; top: 50%; left: 0; width: 100%; background: rgba(0,0,0,0.6); color: #fff; padding: 12px 0; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; z-index: 20; transform: translateY(-50%); border-top: 1px solid #d4af37; border-bottom: 1px solid #d4af37; backdrop-filter: blur(4px); }

        @media (min-width: 1024px) {
            .swiper-produto { display: none !important; }
            .desktop-only-images { display: block; width: 100%; height: 100%; position: relative; }
            .foto-1, .foto-2 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 260px; transition: 0.3s; }
            .foto-2 { opacity: 0; }
            .card-produto:hover .foto-1 { opacity: 0; }
            .card-produto:hover .foto-2 { opacity: 1; }
        }
        @media (max-width: 1023px) {
            .desktop-only-images { display: none; }
            .swiper-produto { display: block; height: 280px; width: 100%; }
            .swiper-produto img { max-height: 260px; object-fit: contain; }
        }

        .cart-toggle { position: fixed; bottom: 30px; right: 25px; background: var(--gold-metallic); width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 2001; }
        .cart-count { position: absolute; top: 0; right: 0; background: #ff4444; color: white; min-width: 22px; height: 22px; border-radius: 11px; font-size: 0.8rem; font-weight: bold; display: flex; justify-content: center; align-items: center; border: 2px solid #000; }
        .cart-overlay { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background: var(--bg-card); z-index: 4000; transition: 0.4s; padding: 30px; overflow-y: auto; text-align: center; }
        .cart-overlay.active { right: 0; }
        .cart-input { width: 100%; background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 1rem; }
        
        .btn-adicionar { background: var(--gold-metallic); color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 10px; text-transform: uppercase; cursor: pointer; }
        .btn-adicionar:disabled { background: #1a1a1a !important; color: #444 !important; cursor: not-allowed; }
        .preco { font-family: var(--font-body); font-size: 1.8rem; color: var(--gold-soft); margin-bottom: 20px; font-weight: 900; }
        .prod-nome { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #fff; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; text-align: left; }
        .qty-btn { background: #222; color: var(--gold-soft); border: 1px solid #333; width: 35px; height: 35px; border-radius: 5px; cursor: pointer; }
        .btn-continuar { width: 100%; margin-top: 15px; background: none; border: 1px solid #444; color: #888; padding: 12px; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        @keyframes chacoalharRapido { 0%, 100% { transform: scale(1); } 20%, 60% { transform: scale(1.15) rotate(5deg); } 40%, 80% { transform: scale(1.15) rotate(-5deg); } }
    </style>
</head>
<body>

    <div id="toast-notificacao">Adicionado à sacola! 🥃</div>

    <div class="cart-toggle" onclick="toggleCart()" id="cart-btn">
        <svg viewBox="0 0 24 24" style="width:30px; fill:#000;"><path d="M17,6H16V5c0-2.21-1.79-4-4-4S8,2.79,8,5v1H7C5.34,6,4,7.34,4,9v10c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V9 C20,7.34,18.66,6,17,6z M10,5c0-1.1,0.9-2,2-2s2,0.9,2,2v1h-4V5z"/></svg>
        <div class="cart-count" id="badge">0</div>
    </div>
    
    <div class="backdrop" id="backdrop" onclick="toggleCart()" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none;"></div>

    <aside class="cart-overlay" id="cart-overlay">
        <button onclick="toggleCart()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--gold-soft); font-size:2.5rem; cursor:pointer;">×</button>
        <h3 style="color:var(--gold-soft); font-size:1.8rem; margin-bottom:30px; font-family: var(--font-premium);">Sua Sacola</h3>
        
        <div id="container-frete">
            <div id="texto-frete">Adicione 3 garrafas para ganhar um benefício!</div>
            <div class="barra-progresso-bg"><div class="barra-progresso-fill" id="barra-frete"></div></div>
        </div>

        <div id="cart-items"></div>
        
        <div id="checkout-form" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <input type="text" id="cliente-nome" class="cart-input" placeholder="Nome Completo">
            <select id="metodo-entrega" class="cart-input" onchange="updateCart()">
                <option value="none" selected disabled>Como quer receber?</option>
                <option value="tele">Tele Entrega (+ R$ 15,00)</option>
                <option value="retirada">Retirada na Loja</option>
            </select>
            <h3 id="cart-total-display" style="margin:25px 0; color:var(--gold-soft); font-size: 1.8rem; font-weight: 900;">Total: R$ 0,00</h3>
            <button id="btn-finalizar" onclick="checkout()" style="background:#25D366; color:white; border:none; width:100%; padding:20px; font-weight:900; border-radius:12px; cursor:pointer;">FINALIZAR NO WHATSAPP</button>
            <button class="btn-continuar" onclick="toggleCart()">Continuar Comprando</button>
        </div>
    </aside>

    <main>
        <div class="swiper swiper-hero">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="passo1.png"></div>
                <div class="swiper-slide"><img src="passo2.png"></div>
                <div class="swiper-slide"><img src="passo3.png"></div>
                <div class="swiper-slide"><img src="passo4.png"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
        <section class="hero-section"><h1>Cachaça do Tio Nan</h1></section>
        <div id="vitrine" class="produtos-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let cart = [];

        new Swiper('.swiper-hero', { loop: true, pagination: { el: '.swiper-pagination', clickable: true }, autoplay: { delay: 5000 } });

        async function loadProducts() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                let htmlDisp = ''; let htmlEsg = '';
                
                rows.forEach(row => {
                    const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                    if(!c || c[3].toLowerCase() !== 'sim') return;
                    const temEstoque = (parseInt(c[4]) || 0) > 0;
                    const html = `
                    <div class="card-produto ${temEstoque ? '' : 'esgotado-card'}" id="card-${c[0]}">
                        <div class="img-wrapper">
                            ${temEstoque ? '' : '<div class="faixa-esgotado-clean">Volta Logo!</div>'}
                            <div class="desktop-only-images"><img src="${c[0]}.png" class="foto-1 prod-img"><img src="${c[0]}-2.png" class="foto-2"></div>
                            <div class="swiper swiper-produto">
                                <div class="swiper-wrapper">
                                    <div class="swiper-slide"><img src="${c[0]}.png" class="prod-img"></div>
                                    <div class="swiper-slide"><img src="${c[0]}-2.png"></div>
                                </div>
                                <div class="swiper-pagination"></div>
                            </div>
                        </div>
                        <div><h3 class="prod-nome">${c[1]}</h3><span class="preco">R$ ${parseFloat(c[2].replace(',','.')).toFixed(2).replace('.',,')}</span></div>
                        ${temEstoque ? `<button class="btn-adicionar" onclick="add('${c[0]}','${c[1]}',${parseFloat(c[2].replace(',','.'))})">Adicionar à sacola</button>` : `<button class="btn-adicionar" disabled>Esgotado</button>`}
                    </div>`;
                    if (temEstoque) htmlDisp += cardHTML = html; else htmlEsg += html;
                });
                document.getElementById('vitrine').innerHTML = htmlDisp + htmlEsg;
                document.querySelectorAll('.swiper-produto').forEach(el => { 
                    new Swiper(el, { loop: true, effect: 'fade', pagination: { el: el.querySelector('.swiper-pagination'), clickable: true }, autoplay: { delay: Math.random() * 2000 + 3000 } }); 
                });
            } catch (e) {}
        }

        function toggleCart() { document.getElementById('cart-overlay').classList.toggle('active'); document.getElementById('backdrop').style.display = document.getElementById('cart-overlay').classList.contains('active') ? 'block' : 'none'; }
        
        function add(id, name, price) {
            const card = document.getElementById(`card-${id}`);
            const imgOriginal = card.querySelector('.prod-img');
            const cartBtn = document.getElementById('cart-btn');
            const clone = imgOriginal.cloneNode(true);
            const rect = imgOriginal.getBoundingClientRect();
            const cartRect = cartBtn.getBoundingClientRect();
            Object.assign(clone.style, { position:'fixed', zIndex:9999, width:rect.width+'px', height:rect.height+'px', top:rect.top+'px', left:rect.left+'px', transition:'all 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045)' });
            clone.classList.add('garrafa-voando');
            document.body.appendChild(clone);
            setTimeout(() => { Object.assign(clone.style, { top:cartRect.top+'px', left:cartRect.left+'px', width:'20px', height:'20px', opacity:0 }); }, 50);
            setTimeout(() => { 
                clone.remove(); cart.push({id, name, price, qtd:1}); updateCart(); 
                document.getElementById('toast-notificacao').classList.add('show'); setTimeout(() => document.getElementById('toast-notificacao').classList.remove('show'), 2000); 
                cartBtn.style.animation = 'chacoalharRapido 0.5s'; setTimeout(() => cartBtn.style.animation='', 500); 
            }, 800);
        }

        function updateCart() {
            const itemsCont = document.getElementById('cart-items');
            const totalG = cart.reduce((acc, i) => acc + i.qtd, 0);
            const barra = document.getElementById('barra-frete');
            const txt = document.getElementById('texto-frete');
            const entrega = document.getElementById('metodo-entrega').value;

            if (barra && txt) {
                barra.style.width = Math.min((totalG/3)*100, 100) + "%";
                if (entrega === 'retirada') {
                    barra.classList.add('barra-verde');
                    txt.innerText = totalG >= 3 ? "DESCONTO DE R$ 15,00 ATIVADO! 💰" : `Faltam ${3-totalG} para R$ 15,00 de desconto`;
                } else {
                    barra.classList.remove('barra-verde');
                    txt.innerText = totalG >= 3 ? "FRETE GRÁTIS ATIVADO! 🚚" : `Faltam ${3-totalG} para Frete Grátis`;
                }
            }

            if(totalG === 0) { if(itemsCont) itemsCont.innerHTML = "<p>Sacola vazia.</p>"; document.getElementById('checkout-form').style.display = 'none'; return; }
            document.getElementById('checkout-form').style.display = 'block';
            itemsCont.innerHTML = cart.map((i, idx) => `<div class="cart-item-row"><div><b>${i.name}</b><br>R$ ${i.price.toFixed(2).replace('.',',')}</div><button class="qty-btn" onclick="cart.splice(${idx},1);updateCart()">X</button></div>`).join('');
            let total = cart.reduce((a,b) => a + (b.price * b.qtd), 0);
            if(entrega === 'tele' && totalG < 3) total += 15;
            if(entrega === 'retirada' && totalG >= 3) total -= 15;
            document.getElementById('cart-total-display').innerText = `Total: R$ ${total.toFixed(2).replace('.',',')}`;
            document.getElementById('badge').innerText = totalG;
        }

        async function checkout() {
            const nome = document.getElementById('cliente-nome').value;
            const entrega = document.getElementById('metodo-entrega').value;
            if(!nome || entrega === 'none') return alert("Preencha tudo!");
            window.open(`https://wa.me/5551989067003?text=${encodeURIComponent("*PEDIDO TIO NAN*\n👤 "+nome+"\n💰 "+document.getElementById('cart-total-display').innerText)}`);
        }
        loadProducts();
    </script>
</body>
</html>
