<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cachaça do Tio Nan</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
:root{--bg:#000;--card:#111;--gold:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);--soft:#d4af37;--esm:linear-gradient(135deg,#2ecc71,#f1f2b5,#27ae60,#f1f2b5,#1e8449)}
*{margin:0;padding:0;box-sizing:border-box}body{width:100%;overflow-x:hidden;background:var(--bg);color:#f5f5f5;font-family:'Montserrat',sans-serif}
.hero-section{text-align:center;padding:30px 15px}.hero-section h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,8vw,3.2rem);background:var(--gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;line-height:1.1;margin:0 auto}
.swiper-hero{width:100%;max-width:700px;margin:0 auto}.swiper-hero img{width:95%;max-height:350px;border-radius:15px;object-fit:contain;display:block;margin:0 auto}
.garrafa-voando{position:fixed;z-index:9999;pointer-events:none;transition:all .8s cubic-bezier(0.6,-0.28,0.735,0.045);object-fit:contain;filter:drop-shadow(0 5px 15px rgba(212, 175, 55, 0.8))}
.swiper-pagination-bullet{background:rgba(255,255,255,0.2)!important;opacity:1!important}.swiper-pagination-bullet-active{background:var(--soft)!important}
#cont-frete{background:#1a1a1a;padding:20px 15px;border-radius:12px;margin:0 15px 20px;text-align:center;border:1px solid #222}
#txt-frete{font-size:.75rem;font-weight:800;text-transform:uppercase;margin-bottom:12px;color:var(--soft);letter-spacing:1px;display:block}
.bar-bg{width:100%;height:10px;background:#333;border-radius:10px;overflow:hidden;position:relative}
.bar-fill{width:0%;height:100%;background:var(--gold);transition:width .5s ease-in-out,background 0.3s;position:absolute;left:0;top:0}
.produtos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px;padding:20px 5% 120px;max-width:1100px;margin:0 auto}
.card-produto{background:var(--card);padding:25px;text-align:center;border-radius:20px;border:1px solid #1a1a1a;position:relative;transition:.3s;display:flex;flex-direction:column;height:100%}
.img-wrapper{width:100%;height:280px;margin-bottom:20px;position:relative;overflow:hidden;flex-shrink:0}
.info-produto{flex-grow:1;display:flex;flex-direction:column;justify-content:center;margin-bottom:20px}
.prod-nome{font-size:1.1rem;text-transform:uppercase;font-weight:800;margin-bottom:12px}.prod-preco{font-size:1.8rem;color:var(--soft);font-weight:900}
.faixa-esgotado-clean{position:absolute;top:50%;left:0;width:100%;background:rgba(0,0,0,0.8);color:#fff;padding:12px 0;font-weight:900;text-transform:uppercase;z-index:20;transform:translateY(-50%);border-top:1px solid var(--soft);border-bottom:1px solid var(--soft);backdrop-filter:blur(4px)}
.card-produto.esgotado-card{opacity:0.7}@media (min-width: 1024px){.swiper-produto{display:none!important}.desktop-only-images{display:block;width:100%;height:100%;position:relative}.foto-1,.foto-2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);height:260px;transition:.3s}.foto-2{opacity:0}.card-produto:not(.esgotado-card):hover .foto-1{opacity:0}.card-produto:not(.esgotado-card):hover .foto-2{opacity:1}}
@media (max-width: 1023px){.desktop-only-images{display:none}.swiper-produto{display:block;height:280px;width:100%;position:relative}.swiper-produto img{max-height:260px;width:auto;object-fit:contain}}
.cart-toggle{position:fixed;bottom:30px;right:25px;background:var(--gold);width:70px;height:70px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;z-index:2001;box-shadow:0 10px 20px rgba(0,0,0,0.5)}
.cart-count{position:absolute;top:0;right:0;background:#ff4444;color:#fff;min-width:22px;height:22px;border-radius:11px;font-size:.8rem;font-weight:700;display:flex;justify-content:center;align-items:center;border:2px solid #000}
.cart-overlay{position:fixed;top:0;right:-100%;width:100%;max-width:450px;height:100vh;background:var(--bg-card);z-index:4000;transition:.4s;padding:30px;overflow-y:auto;text-align:center;touch-action:pan-y}
.cart-overlay.active{right:0}.cart-input{width:100%;background:#1a1a1a;color:#fff;border:1px solid #333;padding:15px;margin-bottom:15px;border-radius:8px;font-size:1rem;outline:0}
.btn-adicionar{background:var(--gold);color:#000;border:0;padding:18px;width:100%;font-weight:900;border-radius:10px;text-transform:uppercase;cursor:pointer}
.cart-item-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;border-bottom:1px solid #222;padding-bottom:10px;text-align:left}
.qty-btn{background:#222;color:var(--gold-soft);border:1px solid #333;width:35px;height:35px;border-radius:5px;cursor:pointer;font-weight:700}
.btn-continuar{width:100%;margin-top:15px;background:0;border:1px solid #444;color:#888;padding:15px;border-radius:10px;font-weight:700;text-transform:uppercase;cursor:pointer;font-size:.8rem}
@keyframes chacoalharRapido{0%,100%{transform:scale(1)}20%,60%{transform:scale(1.1) rotate(5deg)}40%,80%{transform:scale(1.1) rotate(-5deg)}}
</style>
</head>
<body>
<div id="toast" style="position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--gold);color:#000;padding:12px 25px;border-radius:50px;font-weight:900;z-index:5000;transition:.5s;text-transform:uppercase">Adicionado à sacola! 🥃</div>
<div class="cart-toggle" onclick="toggleCart()" id="cart-btn"><svg viewBox="0 0 24 24" style="width:30px;fill:#000"><path d="M17,6H16V5c0-2.21-1.79-4-4-4S8,2.79,8,5v1H7C5.34,6,4,7.34,4,9v10c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V9 C20,7.34,18.66,6,17,6z M10,5c0-1.1,0.9-2,2-2s2,0.9,2,2v1h-4V5z"/></svg><div class="cart-count" id="badge">0</div></div>
<div id="backdrop" onclick="toggleCart()" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:3000;display:none"></div>
<aside class="cart-overlay" id="cart-overlay">
<button onclick="toggleCart()" style="position:absolute;top:20px;right:20px;background:0;border:0;color:var(--soft);font-size:2.5rem;cursor:pointer">×</button>
<h3 style="color:var(--soft);font-size:1.8rem;margin-bottom:30px;font-family:'Playfair Display',serif">Sua Sacola</h3>
<div id="cont-frete"><div id="txt-frete">Adicione 3 garrafas para ganhar um benefício!</div><div class="bar-bg"><div class="bar-fill" id="bar-frete"></div></div></div>
<div id="cart-items"></div>
<div id="checkout-form" style="display:none;margin-top:20px;border-top:1px solid #333;padding-top:20px">
<input type="text" id="cnome" class="cart-input" placeholder="Nome Completo">
<select id="mentrega" class="cart-input" onchange="updateCart()"><option value="none" selected disabled>Como quer receber?</option><option value="tele">Tele Entrega (+ R$ 15,00)</option><option value="retirada">Retirada na Loja</option></select>
<div id="bretirada" style="display:none;margin-bottom:15px;text-align:left;font-size:0.9rem">📍 <strong>Retirada:</strong><br><a href="https://www.google.com/maps/search/?api=1&query=Av.+Bento+Gonçalves,+4321,+Partenon,+Porto+Alegre" target="_blank" style="color:var(--gold-soft);text-decoration:underline">Av. Bento Gonçalves, 4321, POA</a></div>
<div id="bendereco" style="display:none"><input type="text" id="cep" class="cart-input" placeholder="CEP" onblur="buscaCEP()" maxlength="9"><input type="text" id="rua" class="cart-input" placeholder="Rua"><div style="display:flex;gap:5px"><input type="text" id="num" class="cart-input" style="width:35%" placeholder="Nº"><input type="text" id="ap" class="cart-input" style="width:65%" placeholder="Apto"></div><input type="text" id="bairro" class="cart-input" placeholder="Bairro"></div>
<h3 id="ctotal" style="margin:25px 0;color:var(--soft);font-size:1.8rem;font-weight:900">Total: R$ 0,00</h3>
<button onclick="checkout()" style="background:#25D366;color:#fff;border:0;width:100%;padding:20px;font-weight:900;border-radius:12px;cursor:pointer;text-transform:uppercase">Finalizar no WhatsApp</button>
<button class="btn-continuar" onclick="toggleCart()">Continuar Comprando</button></div>
</aside>
<main>
<div class="swiper swiper-hero"><div class="swiper-wrapper"><div class="swiper-slide"><img src="passo1.png"></div><div class="swiper-slide"><img src="passo2.png"></div><div class="swiper-slide"><img src="passo3.png"></div><div class="swiper-slide"><img src="passo4.png"></div></div><div class="swiper-pagination"></div></div>
<section class="hero-section"><h1>Cachaça do <br>Tio Nan</h1></section>
<div id="vitrine" class="produtos-grid"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
const SHEET_ID="1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";let cart=[];
function loadProducts(){fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`).then(r=>r.text()).then(t=>{let rows=t.split('\n').slice(1),hD='',hE='';rows.forEach(row=>{let c=row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v=>v.replace(/"/g,''));if(!c||c[3].toLowerCase()!=='sim')return;let tem=parseInt(c[4])>0;let card=`<div class="card-produto ${tem?'':'esgotado-card'}" id="card-${c[0]}"><div class="img-wrapper">${tem?'':'<div class="faixa-esgotado-clean">Volta Logo!</div>'}<div class="desktop-only-images"><img src="${c[0]}.png" class="foto-1 prod-img"><img src="${c[0]}-2.png" class="foto-2"></div><div class="swiper swiper-produto"><div class="swiper-wrapper"><div class="swiper-slide"><img src="${c[0]}.png" class="prod-img"></div><div class="swiper-slide"><img src="${c[0]}-2.png" class="prod-img"></div></div><div class="swiper-pagination"></div></div></div><div class="info-produto"><h3 class="prod-nome">${c[1]}</h3><span class="prod-preco">R$ ${parseFloat(c[2].replace(',','.')).toFixed(2).replace('.',',')}</span></div>${tem?`<button class="btn-adicionar" onclick="add('${c[0]}','${c[1]}',${parseFloat(c[2].replace(',','.'))})">Adicionar à sacola</button>`:`<button class="btn-adicionar" disabled>Esgotado</button>`}</div>`;if(tem)hD+=card;else hE+=card});document.getElementById('vitrine').innerHTML=hD+hE;document.querySelectorAll('.swiper-produto').forEach(el=>{new Swiper(el,{loop:!0,pagination:{el:el.querySelector('.swiper-pagination')},effect:'fade',autoplay:{delay:3000+Math.random()*2000}})})})}
function toggleCart(){document.getElementById('cart-overlay').classList.toggle('active');document.getElementById('backdrop').style.display=document.getElementById('cart-overlay').classList.contains('active')?'block':'none'}
function add(id,n,p){const card=document.getElementById(`card-${id}`);let img=card.querySelector('.swiper-slide-active img')||card.querySelector('.prod-img');const btn=document.getElementById('cart-btn');const clone=img.cloneNode();const r=img.getBoundingClientRect(),cr=btn.getBoundingClientRect();Object.assign(clone.style,{position:'fixed',zIndex:9999,width:r.width+'px',height:r.height+'px',top:r.top+'px',left:r.left+'px',transition:'all .8s cubic-bezier(0.6,-0.28,0.735,0.045)',filter:'drop-shadow(0 5px 15px rgba(212,175,55,0.8))'});document.body.appendChild(clone);setTimeout(()=>{Object.assign(clone.style,{top:cr.top+'px',left:cr.left+'px',width:'20px',height:'20px',opacity:0})},50);setTimeout(()=>{clone.remove();let i=cart.find(x=>x.id===id);if(i)i.qtd++;else cart.push({id,name:n,price:p,qtd:1});updateCart();document.getElementById('toast').style.transform='translateX(-50%) translateY(0px)';setTimeout(()=>document.getElementById('toast').style.transform='translateX(-50%) translateY(-100px)',2000);btn.style.animation='none';void btn.offsetWidth;btn.style.animation='chacoalharRapido .5s'},800)}
function updateCart(){let tg=cart.reduce((a,b)=>a+b.qtd,0),b=document.getElementById('bar-frete'),t=document.getElementById('txt-frete'),e=document.getElementById('mentrega').value;if(b&&t){b.style.width=Math.min((tg/3)*100,100)+"%";if(e==='retirada'){b.style.background="var(--esm)";if(tg>=3){t.innerText="PARABÉNS! DESCONTO DE R$ 15,00 ATIVADO! 💰";t.style.color="#2ecc71"}else{t.innerText=`Faltam ${3-tg} garrafas para ganhar R$ 15,00 DE DESCONTO!`;t.style.color="var(--gold-soft)"}}else{b.style.background="var(--gold)";if(tg>=3){t.innerText="PARABÉNS! VOCÊ GANHOU FRETE GRÁTIS! 🚚";t.style.color="var(--gold-soft)"}else{t.innerText=`Faltam ${3-tg} garrafas para FRETE GRÁTIS!`;t.style.color="var(--gold-soft)"}}}document.getElementById('checkout-form').style.display=cart.length>0?'block':'none';document.getElementById('bendereco').style.display=e==='tele'?'block':'none';document.getElementById('bretirada').style.display=e==='retirada'?'block':'none';document.getElementById('cart-items').innerHTML=cart.map(i=>`<div class="cart-item-row"><div><b>${i.name}</b><br>R$ ${(i.price*i.qtd).toFixed(2).replace('.',,')}</div><div style="display:flex;align-items:center;gap:10px"><button class="qty-btn" onclick="changeQty('${i.id}',-1)">-</button><span>${i.qtd}</span><button class="qty-btn" onclick="changeQty('${i.id}',1)">+</button></div></div>`).join('');let tot=cart.reduce((a,b)=>a+(b.price*b.qtd),0);if(e==='tele'&&tg<3)tot+=15;if(e==='retirada'&&tg>=3)tot-=15;document.getElementById('ctotal').innerText=`Total: R$ ${tot.toFixed(2).replace('.',',')}`;document.getElementById('badge').innerText=tg}
function changeQty(id,d){let i=cart.find(x=>x.id===id);if(i){i.qtd+=d;if(i.qtd<=0)cart=cart.filter(x=>x.id!==id);updateCart()}}
function checkout(){let n=document.getElementById('cnome').value,e=document.getElementById('mentrega').value;if(!n||e==='none')return alert("Preencha tudo!");window.open(`https://wa.me/5551989067003?text=${encodeURIComponent("*PEDIDO TIO NAN*\n👤 "+n+"\n💰 "+document.getElementById('ctotal').innerText)}`)}
document.addEventListener('DOMContentLoaded', () => {
    new Swiper('.swiper-hero',{loop:!0,pagination:{el:'.swiper-pagination',clickable:!0},autoplay:{delay:5000}});
    loadProducts();
});
</script></body></html>
