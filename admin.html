<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tio Nan - Gestão Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --gold-light: #f1c40f; --bg: #070707; --card: #121212; --green: #2ecc71; 
            --blue: #3498db; --red: #e74c3c; --gray: #999; --text: #ffffff; --radius: 15px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; 
            padding-top: 85px; padding-bottom: 120px; overflow-x: hidden; -webkit-text-size-adjust: 100%;
        }

        /* HEADER FIX */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 75px; 
            background: rgba(0,0,0,0.98); display: flex; align-items: center; 
            padding: 0 25px; z-index: 1100; border-bottom: 1px solid #222; backdrop-filter: blur(15px);
        }
        .menu-icon { font-size: 2rem; color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 15px; z-index: 1200; }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; color: var(--gold); }

        /* SIDEBAR FIX */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: #000; z-index: 2000; transition: 0.3s ease; padding: 40px 20px; box-shadow: none; 
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        .nav-item { 
            display: block; width: 100%; padding: 18px; color: #bbb; border-radius: 12px; 
            margin-bottom: 10px; border: none; background: none; text-align: left; 
            cursor: pointer; text-transform: uppercase; font-size: 0.85rem; font-weight: 700;
        }
        .nav-item.active { background: var(--gold); color: #000; font-weight: 900; }
        .overlay-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }

        /* CONTEÚDO */
        .tab-content { display: none; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .tab-content.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid #222; margin-bottom: 20px; }
        h2 { color: var(--gold); margin-bottom: 20px; text-transform: uppercase; font-size: 1rem; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }

        /* PDV ESTRUTURADO */
        .pdv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .pdv-card { 
            background: #181818; border: 1px solid #282828; border-radius: var(--radius); 
            padding: 12px; text-align: center; display: flex; flex-direction: column; 
            justify-content: space-between; min-height: 250px; position: relative;
        }
        .pdv-card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .pdv-name { font-size: 0.75rem; font-weight: 800; color: #fff; height: 35px; overflow: hidden; text-transform: uppercase; }
        .pdv-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; margin: 10px 0; }
        .pdv-btn-add { background: var(--gold); border: none; padding: 12px; border-radius: 10px; color: #000; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; }
        .badge-pdv { position: absolute; top: -5px; left: -5px; background: var(--green); color: #000; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; }

        /* SACOLA FLUTUANTE */
        #pdv-floating-cart { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: var(--green); color: #000; 
            padding: 18px 25px; border-radius: 50px; display: none; 
            justify-content: space-between; align-items: center; font-weight: 900; 
            z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }

        /* ESTOQUE */
        .estoque-row { background: #181818; padding: 15px; border-radius: var(--radius); margin-bottom: 10px; border: 1px solid #222; }
        .estoque-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .estoque-controles { display: flex; align-items: center; background: #000; border-radius: 10px; height: 40px; overflow: hidden; border: 1px solid #333; }
        .btn-step { background: #222; color: var(--gold); border: none; width: 45px; height: 100%; font-size: 1.5rem; font-weight: 900; }
        .estoque-val { min-width: 50px; text-align: center; font-weight: 900; color: #fff; }

        /* TABELAS */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: #181818; padding: 15px 10px; border-top: 1px solid #222; border-bottom: 1px solid #222; font-size: 0.8rem; }
        td:first-child { border-left: 1px solid #222; border-radius: 12px 0 0 12px; width: 40px; }
        td:last-child { border-right: 1px solid #222; border-radius: 0 12px 12px 0; text-align: right; }
        .status { padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; }
        .Novo { background: var(--green); color: #000; }
        .Concluído { background: var(--blue); color: #fff; }
        .Cancelado { background: var(--red); color: #fff; }

        /* MODAIS */
        .modal-box { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#0a0a0a; padding:20px; border:1px solid var(--gold); border-radius: 20px; width:92%; max-width:450px; z-index:3000; max-height: 90vh; overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2900; }
        input, select { padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px !important; width: 100%; margin-bottom: 10px; outline: none; }
        .btn-status { width:100%; padding: 18px; background: var(--gold); border:none; color: #000; font-weight: 900; border-radius: 12px; text-transform: uppercase; }

        #toast-admin { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 900; z-index: 5000; transition: 0.4s; }
        #toast-admin.show { bottom: 100px; }
    </style>
</head>
<body>

    <div id="toast-admin">Sucesso! ✓</div>

    <header>
        <div class="menu-icon" onclick="toggleMenu()">☰ <span class="header-title">Tio Nan Admin</span></div>
    </header>
    
    <div class="overlay-menu" id="overlay-menu" onclick="toggleMenu()"></div>
    
    <nav class="sidebar" id="sidebar">
        <h3 style="color:var(--gold); margin-bottom:20px; font-weight:900;">GESTÃO</h3>
        <button class="nav-item" onclick="switchTab('tab-pedidos')">🛒 Pedidos</button>
        <button class="nav-item" onclick="switchTab('tab-pdv')">💰 PDV / Balcão</button>
        <button class="nav-item" onclick="switchTab('tab-historico')">📜 Histórico</button>
        <button class="nav-item" onclick="switchTab('tab-estoque')">📦 Estoque</button>
        <button class="nav-item" onclick="switchTab('tab-stats')">📊 Stats</button>
        <button class="nav-item" onclick="switchTab('tab-cadastro')">➕ Novo</button>
    </nav>

    <div id="tab-pedidos" class="tab-content"><div class="card"><h2>Abertos</h2><div id="corpo-pedidos"></div></div></div>
    
    <div id="tab-historico" class="tab-content"><div class="card"><h2>Histórico</h2><div id="corpo-historico"></div></div></div>

    <div id="tab-pdv" class="tab-content">
        <div id="pdv-floating-cart" onclick="abrirSacolaPDV()">
            <span>🛒 <span id="pdv-float-qtd">0</span> ITENS</span>
            <span id="pdv-float-total">R$ 0,00</span>
        </div>
        <div class="pdv-grid" id="corpo-pdv-grid"></div>
    </div>

    <div id="tab-estoque" class="tab-content"><div id="corpo-estoque"></div></div>

    <div id="tab-stats" class="tab-content">
        <div class="card" style="background:linear-gradient(to bottom, #111, #000); border: 1px solid var(--gold);">
            <div style="display:flex; justify-content:space-around; text-align:center;">
                <div><small>VENDAS</small><br><b id="total-fat-geral" style="color:var(--gold); font-size:1.2rem;">R$ 0,00</b></div>
                <div><small>LUCRO</small><br><b id="total-lucro-geral" style="color:var(--green); font-size:1.2rem;">R$ 0,00</b></div>
            </div>
        </div>
        <div id="corpo-estatisticas"></div>
    </div>

    <div id="tab-cadastro" class="tab-content"><div class="card"><h2>Novo Produto</h2><input type="text" id="cad-nome" placeholder="Nome"><input type="number" id="cad-preco" placeholder="Preço"><input type="number" id="cad-custo" placeholder="Custo"><input type="number" id="cad-estoque" placeholder="Estoque"><input type="url" id="cad-foto1" placeholder="URL Foto"><button onclick="cadastrarProduto()" class="btn-status">CADASTRAR</button></div></div>

    <div class="overlay" id="overlay" onclick="fecharTodosModais()"></div>

    <div id="modal-sacola-pdv" class="modal-box" style="padding: 0; flex-direction: column;">
        <div style="padding: 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between;"><h2>Sacola</h2><button onclick="fecharTodosModais()" style="background:none; border:none; color:var(--gold); font-size:2rem;">×</button></div>
        <div style="padding: 20px; overflow-y: auto; flex: 1;"><div id="pdv-itens" style="margin-bottom:20px;"></div><input type="text" id="pdv-cliente" placeholder="Nome Cliente"><select id="pdv-pagamento"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option></select></div>
        <div style="padding: 20px; background: #000; border-top: 1px solid #222;"><h3 id="pdv-total" style="color:var(--gold); text-align:center; margin-bottom:15px;">Total: R$ 0,00</h3><button onclick="finalizarVendaPDV()" class="btn-status" style="background: var(--green);">FINALIZAR</button></div>
    </div>

    <div id="modal-pedido" class="modal-box"><h2 id="m-nome"></h2><div id="detalhes-pedido" style="background: #111; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9rem;"></div><select id="m-status"><option value="Novo Pedido">Novo Pedido</option><option value="Concluído">Concluído</option><option value="Cancelado">Cancelado</option><option value="EXCLUIR">EXCLUIR</option></select><button onclick="salvarStatus()" class="btn-status">SALVAR</button></div>

    <script>
        const urlWebhook = "https://script.google.com/macros/s/AKfycbzdKBuX0YgzgzDNIFtKcYhpVT2_ZOL-jcAVsNJwFjRQcsxw_n7QasraXeIuZiBc44lO/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let adminCart = [];
        let selPedido = null;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay-menu').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }
        function fecharTodosModais() { document.querySelectorAll('.modal-box, .overlay').forEach(el => el.style.display = 'none'); }
        function showToast(m) { const t = document.getElementById('toast-admin'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
        function limparMoeda(v) { return parseFloat(String(v).replace('R$', '').replace('.', '').replace(',', '.')) || 0; }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); if(n.getAttribute('onclick').includes(id)) n.classList.add('active'); });
            document.getElementById(id).classList.add('active');
            if(window.innerWidth < 800) toggleMenu();
            document.getElementById('pdv-floating-cart').style.display = (id === 'tab-pdv' && adminCart.length > 0) ? 'flex' : 'none';
        }

        async function carregar() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${Date.now()}`);
                const rows = (await res.text()).split('\n').slice(1);
                
                const resV = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1901875162&t=${Date.now()}`);
                const rowsV = (await resV.text()).split('\n').slice(1);

                let htmlP = '<table>'; let htmlPDV = ''; let htmlE = '';
                
                // CARREGAR PRODUTOS (PDV E ESTOQUE)
                rows.forEach(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v ? v.replace(/^"|"$/g, '').trim() : "");
                    if(!c[1] || c[1] === "EXCLUIDO") return;
                    const id = c[0], nome = c[1], preco = limparMoeda(c[4]), custo = limparMoeda(c[6]), estoque = c[5] || 0;
                    
                    htmlPDV += `<div class="pdv-card"><div class="badge-pdv" id="badge-pdv-${id}">0</div><img src="${c[2] || 'https://via.placeholder.com/150'}"><div class="pdv-name">${nome}</div><div class="pdv-price">R$ ${preco.toFixed(2)}</div><button class="pdv-btn-add" onclick="addPDV('${id}', '${nome.replace(/'/g, "")}', ${preco}, ${custo})">Adicionar</button></div>`;
                    htmlE += `<div class="estoque-row"><div class="estoque-header"><b>${nome}</b></div><div style="display:flex; justify-content:space-between; align-items:center;"><small>QTD EM ESTOQUE</small><div class="estoque-controles"><button class="btn-step" onclick="stepStock('${id}', -1)">-</button><div class="estoque-val" id="st-${id}">${estoque}</div><button class="btn-step" onclick="stepStock('${id}', 1)">+</button></div></div></div>`;
                });
                document.getElementById('corpo-pdv-grid').innerHTML = htmlPDV;
                document.getElementById('corpo-estoque').innerHTML = htmlE;

                // CARREGAR PEDIDOS
                let fatG = 0; let lucG = 0;
                rowsV.reverse().forEach((row, i) => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v ? v.replace(/^"|"$/g, '').trim() : "");
                    if(!c[1]) return;
                    const val = limparMoeda(c[3]), cus = limparMoeda(c[4]), st = c[6] || "Novo Pedido";
                    if(st.includes("Concluído")) { fatG += val; lucG += (val - cus); }
                    htmlP += `<tr onclick='abrirPedido(${JSON.stringify(c)}, ${rowsV.length - i})'><td></td><td><b>${c[1]}</b><br><small>${c[0].split(' ')[0]}</small></td><td><span class="status ${st.split(' ')[0]}">${st}</span><br><b>R$ ${val.toFixed(2)}</b></td></tr>`;
                });
                document.getElementById('corpo-pedidos').innerHTML = htmlP + '</table>';
                document.getElementById('total-fat-geral').innerText = `R$ ${fatG.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
                document.getElementById('total-lucro-geral').innerText = `R$ ${lucG.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;

            } catch (e) { console.error(e); }
        }

        function addPDV(id, name, price, cost) {
            let item = adminCart.find(x => x.id === id);
            if(item) item.qtd++; else adminCart.push({id, name, price, cost, qtd:1});
            updatePDVCart();
            showToast("Adicionado!");
        }

        function updatePDVCart() {
            const float = document.getElementById('pdv-floating-cart');
            if(adminCart.length === 0) { float.style.display = 'none'; fecharTodosModais(); return; }
            float.style.display = 'flex';
            
            let tQtd = 0; let tVal = 0;
            document.querySelectorAll('.badge-pdv').forEach(b => b.style.display = 'none');
            
            document.getElementById('pdv-itens').innerHTML = adminCart.map(i => {
                tQtd += i.qtd; tVal += (i.price * i.qtd);
                const badge = document.getElementById(`badge-pdv-${i.id}`);
                if(badge) { badge.innerText = i.qtd; badge.style.display = 'flex'; }
                return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;"><div><b>${i.name}</b><br>R$ ${(i.price * i.qtd).toFixed(2)}</div><div class="estoque-controles" style="height:30px;"><button class="btn-step" style="width:30px;" onclick="changePDV('${i.id}', -1)">-</button><span style="width:30px;text-align:center;">${i.qtd}</span><button class="btn-step" style="width:30px;" onclick="changePDV('${i.id}', 1)">+</button></div></div>`;
            }).join('');

            document.getElementById('pdv-float-qtd').innerText = tQtd;
            document.getElementById('pdv-float-total').innerText = `R$ ${tVal.toFixed(2)}`;
            document.getElementById('pdv-total').innerText = `Total: R$ ${tVal.toFixed(2)}`;
        }

        function changePDV(id, d) {
            let i = adminCart.find(x => x.id === id);
            if(i) { i.qtd += d; if(i.qtd <= 0) adminCart = adminCart.filter(x => x.id !== id); }
            updatePDVCart();
        }

        function abrirSacolaPDV() { document.getElementById('modal-sacola-pdv').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; }

        async function finalizarVendaPDV() {
            if(adminCart.length === 0) return;
            const payload = { 
                cliente: document.getElementById('pdv-cliente').value || "Venda Balcão", 
                itens: adminCart.map(i => `${i.name} (x${i.qtd})`).join(', '), 
                total: document.getElementById('pdv-total').innerText,
                custo: adminCart.reduce((a, b) => a + (b.cost * b.qtd), 0),
                pagamento: document.getElementById('pdv-pagamento').value,
                status: "Concluído", endereco: "Balcão", isAdminSale: true,
                cartItems: adminCart.map(i => ({id: i.id, qtd: i.qtd}))
            };
            fecharTodosModais(); adminCart = []; updatePDVCart();
            showToast("Registrando...");
            fetch(urlWebhook, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            setTimeout(carregar, 3000);
        }

        function abrirPedido(c, row) { selPedido = row; document.getElementById('m-nome').innerText = c[1]; document.getElementById('detalhes-pedido').innerHTML = `<b>ITENS:</b> ${c[2]}<br><br><b>PAGAMENTO:</b> ${c[5]}<br><b>TOTAL:</b> R$ ${limparMoeda(c[3]).toFixed(2)}`; document.getElementById('m-status').value = c[6] || "Novo Pedido"; document.getElementById('modal-pedido').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        
        async function salvarStatus() {
            const st = document.getElementById('m-status').value;
            fecharTodosModais(); showToast("Atualizando...");
            fetch(`${urlWebhook}?action=updateStatus&row=${selPedido}&status=${st}&t=${Date.now()}`, { mode: 'no-cors' });
            setTimeout(carregar, 3000);
        }

        function stepStock(id, d) {
            const el = document.getElementById(`st-${id}`);
            const nv = parseInt(el.innerText) + d;
            el.innerText = nv;
            fetch(`${urlWebhook}?action=updateStock&id=${id}&stock=${nv}`, { mode: 'no-cors' });
        }

        carregar();
        setInterval(carregar, 60000);
    </script>
</body>
</html>
