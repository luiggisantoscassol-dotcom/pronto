<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tio Nan Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #121212; --new: #2ecc71; --pend: #f1c40f; --done: #3498db; --canc: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding: 20px; padding-bottom: 100px; }
        
        h1 { color: var(--gold); margin-bottom: 25px; font-weight: 900; text-align: center; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; }
        
        /* ABAS */
        .tab-container { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #555; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; padding: 8px 12px; transition: 0.3s; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .secao-conteudo { display: none; }
        .secao-conteudo.ativa { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LISTA DE PEDIDOS */
        .pedido-card { background: var(--card); border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; display: flex; align-items: stretch; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .pedido-check { width: 50px; display: flex; align-items: center; justify-content: center; background: #1a1a1a; border-right: 1px solid #222; }
        .pedido-info { flex: 1; padding: 15px; }
        .pedido-info b { font-size: 1.1rem; color: #fff; text-transform: uppercase; }
        .pedido-detalhe { font-size: 0.9rem; color: #999; margin-top: 5px; line-height: 1.4; }
        
        .pedido-status-area { padding: 15px; text-align: right; display: flex; flex-direction: column; justify-content: center; min-width: 110px; }
        .valor { font-size: 1.1rem; font-weight: 900; color: var(--gold); margin-top: 5px; }
        
        .status { padding: 5px 10px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; color: #000; display: inline-block; }
        .status-NovoPedido { background: var(--new); }
        .status-Pendente { background: var(--pend); }
        .status-Concluído { background: var(--done); color: #fff; }
        .status-Cancelado { background: var(--canc); color: #fff; }

        .maps-link { color: #3498db; text-decoration: none; font-size: 0.8rem; font-weight: 900; display: inline-block; margin-top: 10px; border: 1px solid #3498db; padding: 4px 10px; border-radius: 5px; }

        /* ESTOQUE */
        .estoque-item { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #222; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .estoque-item b { font-size: 1rem; text-transform: uppercase; }
        .btn-step { background: #222; color: var(--gold); border: 1px solid var(--gold); width: 50px; height: 50px; font-weight: bold; border-radius: 12px; font-size: 1.6rem; }
        .estoque-input { background: transparent; border: none; color: #fff; width: 60px; text-align: center; font-weight: 900; font-size: 1.4rem; }

        /* MODAL */
        #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#000; padding:30px; border:1px solid var(--gold); border-radius:20px; width:94%; z-index:1000; box-shadow: 0 0 30px var(--gold); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; backdrop-filter: blur(5px); }
        .btn-status { width:100%; padding:18px; background:var(--gold); border:none; font-weight: 900; margin-top:20px; border-radius:12px; text-transform: uppercase; color: #000; font-size: 1rem; }

        #bulk-bar { display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 18px 30px; border-radius: 60px; font-weight: 900; z-index: 2000; box-shadow: 0 10px 30px #000; align-items: center; gap: 20px; width: 90%; justify-content: space-between; }
        #bulk-bar button { background: #000; color: #fff; border: none; padding: 10px 18px; border-radius: 30px; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>

    <h1>Tio Nan Admin</h1>

    <div class="tab-container">
        <button class="tab-btn active" onclick="mudarAba('ativos', this)">📦 Ativos</button>
        <button class="tab-btn" onclick="mudarAba('arquivados', this)">📁 Histórico</button>
        <button class="tab-btn" onclick="mudarAba('estoque', this)">🍯 Estoque</button>
    </div>
    
    <div id="secao-ativos" class="secao-conteudo ativa">
        <div id="corpo-ativos"></div>
    </div>

    <div id="secao-arquivados" class="secao-conteudo">
        <div id="corpo-arquivados"></div>
    </div>

    <div id="secao-estoque" class="secao-conteudo">
        <div id="corpo-estoque"></div>
    </div>

    <div id="bulk-bar">
        <span id="bulk-count">0 selecionados</span>
        <button onclick="mudarVariosStatus()">Alterar Status</button>
    </div>

    <div class="overlay" id="overlay" onclick="fechar()"></div>
    <div id="modal">
        <h2 id="m-nome" style="color:var(--gold); font-size:1.4rem; margin-bottom:15px; text-transform: uppercase;"></h2>
        <div id="m-detalhes" style="font-size: 1rem; margin-bottom: 25px; color: #ccc; line-height: 1.6;"></div>
        <div id="m-controle">
            <label style="font-size: 0.7rem; color: #666; font-weight: 900; margin-bottom: 5px; display: block;">NOVO STATUS:</label>
            <select id="m-status" style="width:100%; padding:18px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:12px; font-weight: 900; font-size: 1rem;">
                <option value="Novo Pedido">Novo Pedido</option>
                <option value="Pendente">Pendente</option>
                <option value="Concluído">Concluído</option>
                <option value="Cancelado">Cancelado</option>
            </select>
            <button onclick="salvarStatus()" class="btn-status">Atualizar Pedido</button>
        </div>
    </div>

    <script>
        const urlWebhook = "https://script.google.com/macros/s/AKfycbwu4OWF-2JEsWZl3fw7qpevre0rSeN7hGUJZUPWwx-Jt50kzJ7QinlfOepG5ARQC5WG/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let sel = null;

        function mudarAba(aba, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.secao-conteudo').forEach(s => s.classList.remove('ativa'));
            document.getElementById('secao-' + aba).classList.add('ativa');
            document.getElementById('bulk-bar').style.display = 'none';
        }

        async function carregar() {
            // ATIVOS
            const resA = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1901875162&t=${Date.now()}`);
            const rowsA = (await resA.text()).split('\n').slice(1).reverse();
            renderizar(rowsA, 'corpo-ativos', true);

            // ARQUIVADOS
            const resH = await fetch(`${urlWebhook}?action=getArquivados`);
            const rowsH = await resH.json();
            renderizar(rowsH.reverse(), 'corpo-arquivados', false);

            // ESTOQUE
            const resE = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0&t=${Date.now()}`);
            const rowsE = (await resE.text()).split('\n').slice(1);
            let htmlE = '';
            rowsE.forEach(row => {
                const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                htmlE += `<div class="estoque-item"><b>${c[1]}</b><div style="display:flex; align-items:center; gap:15px;"><button class="btn-step" onclick="stepStock('${c[0]}', -1)">-</button><input type="number" id="st-${c[0]}" class="estoque-input" value="${c[4]}" onchange="salvarEstoque('${c[0]}')"><button class="btn-step" onclick="stepStock('${c[0]}', 1)">+</button></div></div>`;
            });
            document.getElementById('corpo-estoque').innerHTML = htmlE;
        }

        function renderizar(rows, containerId, editavel) {
            let html = '';
            rows.forEach((row, i) => {
                const c = Array.isArray(row) ? row : row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                const statusClasse = c[6].replace(/\s/g, '');
                const linkMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c[7])}`;

                html += `
                <div class="pedido-card">
                    ${editavel ? `<div class="pedido-check"><input type="checkbox" class="check-ped" style="width:25px; height:25px; accent-color:var(--gold)" value="${rows.length - i}" onchange="toggleBulk()"></div>` : ''}
                    <div class="pedido-info" onclick='abrirPedido(${JSON.stringify(c)}, ${rows.length - i}, ${editavel})'>
                        <b>${c[1]}</b><br>
                        <div class="pedido-detalhe">
                            ${c[2]}<br>
                            <small style="color:#666">${c[0]}</small>
                        </div>
                        ${c[7] ? `<a href="${linkMaps}" target="_blank" class="maps-link" onclick="event.stopPropagation();">📍 GOOGLE MAPS</a>` : ''}
                    </div>
                    <div class="pedido-status-area" onclick='abrirPedido(${JSON.stringify(c)}, ${rows.length - i}, ${editavel})'>
                        <span class="status status-${statusClasse}">${c[6]}</span>
                        <div class="valor">R$ ${c[3]}</div>
                        <small style="font-size:0.6rem; color:#555">${c[5]}</small>
                    </div>
                </div>`;
            });
            document.getElementById(containerId).innerHTML = html || '<p style="text-align:center; padding:50px; color:#444">Nenhum pedido aqui.</p>';
        }

        function toggleBulk() {
            const n = document.querySelectorAll('.check-ped:checked').length;
            const bar = document.getElementById('bulk-bar');
            bar.style.display = n > 0 ? 'flex' : 'none';
            document.getElementById('bulk-count').innerText = `${n} SELECIONADOS`;
        }

        async function mudarVariosStatus() {
            const novo = prompt("NOVO STATUS (Novo Pedido, Pendente, Concluído, Cancelado):");
            if(!novo) return;
            const rows = Array.from(document.querySelectorAll('.check-ped:checked')).map(cb => cb.value);
            document.getElementById('bulk-bar').innerText = "ATUALIZANDO...";
            await fetch(`${urlWebhook}?action=updateBulkStatus&rows=${JSON.stringify(rows)}&status=${encodeURIComponent(novo)}`);
            location.reload();
        }

        function abrirPedido(dados, linha, editavel) {
            sel = { linha, dados };
            document.getElementById('m-nome').innerText = dados[1];
            document.getElementById('m-detalhes').innerHTML = `
                <b style="color:var(--gold)">🛒 ITENS:</b><br>${dados[2]}<br><br>
                <b style="color:var(--gold)">💰 PAGAMENTO:</b> ${dados[5]}<br>
                <b style="color:var(--gold)">📍 ENDEREÇO:</b> ${dados[7]}<br>
                <b style="color:var(--gold)">💵 VALOR:</b> R$ ${dados[3]}
            `;
            document.getElementById('m-status').value = dados[6];
            document.getElementById('m-controle').style.display = editavel ? 'block' : 'none';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        async function salvarStatus() {
