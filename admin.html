<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tio Nan - Gestão Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --gold-light: #f1c40f; --gold-grad: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            --bg: #050505; --card: #121212; --green: #2ecc71; --blue: #3498db; --red: #e74c3c; --text: #ffffff; --radius: 24px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: pan-y; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; padding-top: 85px; padding-bottom: 110px; overflow-x: hidden; overscroll-behavior-y: contain; }

        header { position: fixed; top: 0; left: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1100; border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(20px); }
        .header-title { font-weight: 900; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; color: var(--gold); }
        .menu-icon { font-size: 2rem; color: var(--gold); cursor: pointer; background: #111; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid #222; }

        .sidebar { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #0a0a0a; z-index: 2000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px 20px; border-left: 1px solid #222; }
        .sidebar.active { right: 0; box-shadow: -30px 0 80px rgba(0,0,0,1); }
        .sidebar h3 { color: var(--gold); margin-bottom: 35px; border-bottom: 1px solid #222; padding-bottom: 20px; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; text-align: right; }
        .nav-item { display: flex; align-items: center; justify-content: flex-end; gap: 15px; width: 100%; padding: 22px; color: #777; font-weight: 700; border-radius: 18px; margin-bottom: 12px; border: none; background: transparent; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }
        .nav-item.active { background: var(--gold-grad); color: #000; font-weight: 900; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .overlay-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1500; display: none; backdrop-filter: blur(8px); }

        .tab-content { display: none; width: 100%; max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .tab-content.active { display: block; animation: fadeInUp 0.6s ease; }
        .card { background: var(--card); padding: 25px; border-radius: var(--radius); border: 1px solid #1a1a1a; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); margin-bottom: 25px; text-transform: uppercase; font-size: 1rem; letter-spacing: 1.5px; text-align: center; font-weight: 900; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; table-layout: fixed; }
        td { padding: 18px 12px; background: #080808; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; vertical-align: middle; }
        td:first-child { border-left: 1px solid #1a1a1a; border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid #1a1a1a; border-radius: 0 15px 15px 0; text-align: right; width: 120px; }
        .row-removing { opacity: 0; transform: translateX(50px); transition: 0.4s; }

        .status { padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 0.6rem; text-transform: uppercase; display: inline-block; margin-bottom: 4px; }
        .Novo { background: var(--green); color: #000; }
        .Concluído { background: var(--blue); color: #fff; }
        .Cancelado { background: var(--red); color: #fff; }

        /* PDV GRID E CARDS - MELHORADOS */
        .pdv-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            padding-bottom: 20px; 
        }
        .pdv-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: var(--radius); 
            padding: 15px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative; 
            min-height: 290px; /* Mais espaço para não "esmagar" os botões */
        }
        .pdv-card img { 
            width: 100%; 
            height: 100px; 
            object-fit: contain; 
            margin-bottom: 10px; 
            margin-top: 15px; /* Evita sobreposição do botão editar */
        }
        .btn-edit-product { 
            position: absolute; 
            top: 0; 
            right: 0; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(212, 175, 55, 0.15); 
            color: var(--gold); 
            border-radius: 0 var(--radius) 0 20px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            z-index: 5; 
        }
        .pdv-name { 
            font-weight: 800; 
            font-size: 0.9rem; 
            color: #fff;
            margin-bottom: 5px; 
            line-height: 1.2;
        }
        .pdv-price { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 1.1rem; 
            margin-bottom: 15px; 
        }
        .pdv-btn-add { 
            width: 100%; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 15px 10px; 
            border-radius: 15px; 
            color: var(--gold); 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            cursor: pointer;
            transition: 0.2s;
        }
        .pdv-btn-add:active {
            background: var(--gold);
            color: #000;
        }

        .estoque-row { background: #080808; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .estoque-controles { display: flex; align-items: center; background: #000; border-radius: 15px; border: 1px solid #333; height: 65px; margin-top: 10px; }
        .btn-step { background: transparent; color: var(--gold); border: none; flex: 1; height: 100%; font-size: 2rem; font-weight: 900; }

        .stat-month-card { background: #111; border-radius: 20px; padding: 22px; margin-bottom: 15px; border-left: 6px solid var(--gold); cursor: pointer; border: 1px solid #222; }
        .resumo-total { background: linear-gradient(135deg, #181818, #000); padding: 25px; border-radius: var(--radius); margin-bottom: 25px; display: flex; justify-content: space-around; text-align: center; border-bottom: 3px solid var(--gold); }
        
        .modal-box { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#080808; padding:30px; border:1px solid #222; border-radius: 30px; width:94%; max-width:500px; z-index:3000; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,1); }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2900; backdrop-filter: blur(15px); }
        
        input, select { padding: 20px; border-radius: 18px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px !important; margin-bottom: 12px; width: 100%; font-family: inherit; }
        .btn-status { width: 100%; padding: 22px; background: var(--gold-grad); border: none; color: #000; font-weight: 900; border-radius: 20px; text-transform: uppercase; cursor: pointer; }
        #toast-admin { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 18px 40px; border-radius: 50px; font-weight: 900; z-index: 5000; transition: 0.5s; text-transform: uppercase; }
        #toast-admin.show { bottom: 120px; }

        @media (max-width: 450px) { .sidebar { width: 85%; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="toast-admin">Sucesso! ✓</div>

    <header>
        <span class="header-title">Tio Nan Gestão</span>
        <div class="menu-icon" onclick="toggleMenu()"><span>☰</span></div>
    </header>
    
    <div class="overlay-menu" id="overlay-menu" onclick="toggleMenu()"></div>
    
    <nav class="sidebar" id="sidebar">
        <h3>CONTROLE PRO</h3>
        <button class="nav-item" onclick="switchTab('tab-pedidos')">Pedidos 🛒</button>
        <button class="nav-item" onclick="switchTab('tab-pdv')">Balcão 💰</button>
        <button class="nav-item" onclick="switchTab('tab-historico')">Histórico 📜</button>
        <button class="nav-item" onclick="switchTab('tab-estoque')">Estoque 📦</button>
        <button class="nav-item" onclick="switchTab('tab-stats')">Resultados 📊</button>
        <button class="nav-item" onclick="switchTab('tab-cadastro')">Cadastro ➕</button>
        <button class="nav-item" onclick="switchTab('tab-rastreio')">Rastreio 👁️</button>
    </nav>

    <div id="tab-pedidos" class="tab-content">
        <div class="card">
            <div id="setup-notificacoes" style="padding:15px; background:rgba(212,175,55,0.1); border-radius:15px; margin-bottom:20px; text-align:center; display:none;">
                <p style="font-size:0.8rem; margin-bottom:10px;">Deseja receber notificações no celular?</p>
                <button onclick="ativarNotificacoes()" style="padding:10px 20px; background:var(--gold); border:none; border-radius:10px; font-weight:900; font-size:0.7rem; cursor:pointer;">ATIVAR ALERTAS</button>
            </div>
            <h2>Pedidos em Aberto</h2>
            <div id="corpo-pedidos"></div>
        </div>
    </div>
    <div id="tab-historico" class="tab-content"><div class="card"><h2>Histórico Total</h2><div id="corpo-historico"></div></div></div>
    <div id="tab-rastreio" class="tab-content"><div class="card"><h2>Rastreio de Adições (IP)</h2><div id="corpo-rastreio"></div></div></div>
    
    <div id="tab-pdv" class="tab-content">
        <div id="pdv-floating-cart" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); width:92%; max-width:500px; background:#000; border:2px solid var(--gold); padding:20px; border-radius:25px; z-index:1000; display:none; justify-content:space-between; align-items:center; font-weight:900; cursor:pointer;" onclick="abrirSacolaPDV()"><span>🛒 <span id="pdv-float-qtd">0</span> ITENS</span><span id="pdv-float-total">R$ 0,00</span></div>
        <div class="pdv-grid" id="corpo-pdv-grid"></div>
    </div>

    <div id="tab-estoque" class="tab-content"><div class="card"><h2>Gestão de Estoque</h2><div id="corpo-estoque"></div></div></div>

    <div id="tab-stats" class="tab-content">
        <div class="card">
            <h2>Resumo Geral</h2>
            <div class="resumo-total">
                <div class="resumo-item"><span>Total Vendas</span><b id="total-fat-geral">R$ 0,00</b></div>
                <div class="resumo-item"><span>Lucro Real</span><b id="total-lucro-geral" style="color:var(--green)">R$ 0,00</b></div>
            </div>
        </div>
        <div id="corpo-estatisticas"></div>
    </div>

    <div id="tab-cadastro" class="tab-content">
        <div class="card">
            <h2>Cadastrar Produto</h2>
            <input type="text" id="cad-nome" placeholder="Nome do Produto">
            <input type="number" id="cad-preco" placeholder="Preço de Venda">
            <input type="number" id="cad-custo" placeholder="Preço de Custo">
            <input type="number" id="cad-estoque" placeholder="Quantidade Inicial">
            <input type="url" id="cad-foto1" placeholder="Link da Foto 1">
            <input type="url" id="cad-foto2" placeholder="Link da Foto 2">
            <textarea id="cad-descricao" placeholder="Descrição da Cachaça (Sommelier)" style="width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 18px; margin-bottom: 12px; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
            <input type="text" id="cad-teor" placeholder="Teor Alcoólico (ex: 38% Vol)">
            <input type="text" id="cad-harmonizacao" placeholder="Harmonização (ex: Queijos curados)">
            <button onclick="cadastrarProduto()" class="btn-status">SALVAR NOVO PRODUTO</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="fecharTodosModais()"></div>
    
    <div id="modal-mes-detalhe" class="modal-box" style="padding: 0; flex-direction: column;">
        <div style="padding: 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; border-radius: 30px 30px 0 0;"><h2 id="mes-titulo-detalhe">Mês</h2><button onclick="fecharTodosModais()" style="background:none; border:none; color:var(--gold); font-size:2.5rem;">×</button></div>
        <div id="corpo-mes-detalhe" style="padding: 10px 20px; overflow-y: auto; flex: 1;"></div>
    </div>

    <div id="modal-editar" class="modal-box">
        <h2>Editar Produto</h2>
        <input type="hidden" id="edit-id">
        <label>Nome:</label><input type="text" id="edit-nome">
        <label>Venda:</label><input type="number" id="edit-preco" step="0.01">
        <label>Custo:</label><input type="number" id="edit-custo" step="0.01">
        <label>Descrição:</label><textarea id="edit-descricao" style="width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 18px; margin-bottom: 12px; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
        <label>Teor Alcoólico:</label><input type="text" id="edit-teor">
        <label>Harmonização:</label><input type="text" id="edit-harmonizacao">
        <button onclick="salvarEdicao()" class="btn-status">SALVAR ALTERAÇÕES</button>
        <button onclick="excluirProduto(document.getElementById('edit-id').value)" style="background:transparent; color:var(--red); border:none; margin-top:20px; width:100%; font-weight:800; cursor:pointer;">EXCLUIR PRODUTO</button>
    </div>

    <div id="modal-pedido" class="modal-box"><h2 id="m-nome"></h2><div id="detalhes-pedido" style="margin: 20px 0; background: #000; padding: 25px; border-radius: 20px; border: 1px solid #222; line-height: 1.6;"></div><select id="m-status"><option value="Novo Pedido">Novo Pedido</option><option value="Concluído">Concluído</option><option value="Cancelado">Cancelado</option><option value="EXCLUIR">EXCLUIR</option></select><button onclick="salvarStatus()" class="btn-status">ATUALIZAR STATUS</button></div>

    <div id="modal-sacola-pdv" class="modal-box" style="padding: 0; flex-direction: column;">
        <div style="padding: 25px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; border-radius: 30px 30px 0 0;"><h2>Sacola</h2><button onclick="fecharTodosModais()" style="background:none; border:none; color:var(--gold); font-size:2.5rem;">×</button></div>
        <div style="padding: 25px; overflow-y: auto; flex: 1;">
            <div id="pdv-itens"></div>
            <input type="text" id="pdv-cliente" placeholder="Nome do Cliente">
            <input type="number" id="pdv-frete" placeholder="Valor do Frete R$ (Opcional)" step="0.01">
            <select id="pdv-pagamento"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option></select>
        </div>
        <div style="padding: 25px; background: #000; border-top: 1px solid #222;"><h3 id="pdv-total" style="color:var(--gold); text-align:center; margin-bottom:20px; font-weight: 900; font-size: 1.6rem;">R$ 0,00</h3><button onclick="finalizarVendaPDV()" style="width:100%; padding:22px; background:var(--green); border:none; color:#000; border-radius:18px; font-weight:900;">CONCLUIR VENDA</button></div>
    </div>

    <script>
        const supabaseUrl = 'https://eegqobqhrfdkmjyjnqvp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ3FvYnFocmZka21qeWpucXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjU5NzcsImV4cCI6MjA5MzEwMTk3N30.rHSlJ1Fv0oSEsJc4r44czBs3Lb6dkfWl-WwtIHawpys';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let sel = null; let adminCart = []; let statsMensal = {};

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay-menu').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }
        function fecharTodosModais() { document.querySelectorAll('.modal-box').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast-admin'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        // --- SISTEMA DE NOTIFICAÇÕES NATIVAS ---
        function verificarPermissaoNotificacao() {
            if ("Notification" in window) {
                if (Notification.permission === "default") {
                    document.getElementById('setup-notificacoes').style.display = 'block';
                }
            }
        }
        
        async function ativarNotificacoes() {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('setup-notificacoes').style.display = 'none';
                new Notification("Tio Nan - Gestão Pro", { body: "Notificações ativadas com sucesso! 🥃" });
            }
        }

        function dispararNotificacaoNativa(cliente) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("🥃 NOVO PEDIDO!", {
                    body: `O cliente ${cliente} acabou de fazer um pedido.`,
                    icon: 'https://eegqobqhrfdkmjyjnqvp.supabase.co/storage/v1/object/public/fotos/favicon.png' // Fallback se tiver ícone
                });
            }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => { n.classList.remove('active'); if(n.getAttribute('onclick').includes(id)) n.classList.add('active'); });
            document.getElementById(id).classList.add('active');
            if(window.innerWidth < 800 && document.getElementById('sidebar').classList.contains('active')) toggleMenu();
            const float = document.getElementById('pdv-floating-cart');
            if(float) float.style.display = (id === 'tab-pdv' && adminCart.length > 0) ? 'flex' : 'none';
            localStorage.setItem('abaAtivaTioNan', id);
        }

        function extrairMesAno(dtStr) {
            if (!dtStr) return "S/D";
            const dt = new Date(dtStr);
            const mes = String(dt.getMonth() + 1).padStart(2, '0');
            return `${mes}/${dt.getFullYear()}`;
        }

        function formatarDataHora(dtStr) {
            if (!dtStr) return "";
            const dt = new Date(dtStr);
            return `${String(dt.getDate()).padStart(2, '0')}/${String(dt.getMonth()+1).padStart(2, '0')}/${dt.getFullYear()} às ${String(dt.getHours()).padStart(2, '0')}:${String(dt.getMinutes()).padStart(2, '0')}`;
        }
        
        function formatarData(dtStr) {
            if (!dtStr) return "";
            const dt = new Date(dtStr);
            return `${String(dt.getDate()).padStart(2, '0')}/${String(dt.getMonth()+1).padStart(2, '0')}/${dt.getFullYear()}`;
        }

        async function carregar() {
            try {
                // Carregar Produtos
                const { data: produtos } = await db.from('produtos').select('*').eq('excluido', false).order('nome');
                
                // Carregar Pedidos
                const { data: pedidos } = await db.from('pedidos').select('*').order('created_at', { ascending: false });

                // Carregar Rastreio
                const { data: rastreio } = await db.from('rastreio_carrinho').select('*').order('created_at', { ascending: false });

                // Processar Rastreio de IP
                let ipMap = {};
                if (rastreio) {
                    rastreio.forEach(r => {
                        const chave = r.ip;
                        const nomeCliente = r.cliente_nome && r.cliente_nome !== 'Anônimo' ? r.cliente_nome : null;
                        if(!ipMap[chave]) ipMap[chave] = { cont: 0, items: [], ultimo: r.created_at, nome: nomeCliente };
                        // Atualiza o nome se achou um que não é Anônimo
                        if (nomeCliente && !ipMap[chave].nome) ipMap[chave].nome = nomeCliente;
                        
                        ipMap[chave].cont++;
                        ipMap[chave].items.push(`${r.produto_nome} (${formatarDataHora(r.created_at)})`);
                    });
                }
                
                let htmlRastreio = '<table>';
                Object.keys(ipMap).forEach((ip, index) => {
                    const data = ipMap[ip];
                    const exibirNome = data.nome ? data.nome : "Visitante Anônimo";
                    const listaItens = data.items.map(i => `<li>${i}</li>`).join('');
                    
                    htmlRastreio += `<tr onclick="document.getElementById('detalhe-${index}').style.display = document.getElementById('detalhe-${index}').style.display === 'none' ? 'table-row' : 'none'" style="cursor:pointer; border-bottom:1px solid #222;">
                                        <td><b style="font-size:1.1rem;">${exibirNome}</b><br><small style="color:#888;">IP: ${ip}</small><br><small>Último: ${formatarDataHora(data.ultimo)}</small></td>
                                        <td style="text-align:right;"><b style="color:var(--gold); font-size:1.2rem;">${data.cont} itens</b> <span style="font-size:0.8rem; opacity:0.6;">▼</span></td>
                                     </tr>
                                     <tr id="detalhe-${index}" style="display:none; background:#1a1a1a;">
                                        <td colspan="2" style="padding:15px; font-size:0.9rem; color:#ccc; border-radius: 8px;">
                                            <ul style="list-style-type:none; margin:0; padding:0; line-height:1.6;">${listaItens}</ul>
                                        </td>
                                     </tr>`;
                });
                document.getElementById('corpo-rastreio').innerHTML = htmlRastreio + '</table>';

                // Processar Pedidos
                let htmlV = '<table>'; let htmlH = '<table>'; 
                statsMensal = {}; let fatG = 0; let lucG = 0;

                if (pedidos) {
                    pedidos.forEach(p => {
                        const val = parseFloat(p.total || 0);
                        const cus = parseFloat(p.custo || 0);
                        const frt = parseFloat(p.frete || 0);
                        const st = p.status || "Novo Pedido";
                        const isA = (st === "Concluído" || st === "Cancelado");
                        const dtF = `${formatarData(p.created_at)}<br><small style="color:#888;">${new Date(p.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;
                        
                        const safeData = encodeURIComponent(JSON.stringify(p));

                        if(st === "Concluído") {
                            let mesAno = extrairMesAno(p.created_at);
                            if(!statsMensal[mesAno]) statsMensal[mesAno] = { f: 0, l: 0, orders: [] };
                            statsMensal[mesAno].f += val; 
                            statsMensal[mesAno].l += (val - cus - frt);
                            statsMensal[mesAno].orders.push(p);
                            fatG += val; 
                            lucG += (val - cus - frt);
                        }

                        const tr = `<tr onclick="abrirPedido('${safeData}')">
                                    <td><b>${p.cliente}</b><br><small>${dtF}</small></td>
                                    <td><span class="status ${st.split(' ')[0]}">${st}</span><br><b style="color:var(--gold);">R$ ${val.toFixed(2)}</b></td>
                                </tr>`;

                        if (isA) htmlH += tr; else htmlV += tr;
                    });
                }
                
                document.getElementById('corpo-pedidos').innerHTML = htmlV + '</table>';
                document.getElementById('corpo-historico').innerHTML = htmlH + '</table>';
                document.getElementById('total-fat-geral').innerText = `R$ ${fatG.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
                document.getElementById('total-lucro-geral').innerText = `R$ ${lucG.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;

                // Processar Estatísticas Mensais
                let htmlStats = "";
                Object.keys(statsMensal).sort().reverse().forEach(mes => {
                    htmlStats += `<div class="stat-month-card" onclick="verDetalhesMes('${mes}')">
                        <div style="font-weight:900; color:var(--gold); margin-bottom:10px; display:flex; justify-content:space-between;"><span>${mes}</span> <span>➔</span></div>
                        <div class="stat-row"><span style="color:#888;">Faturamento:</span> <b>R$ ${statsMensal[mes].f.toLocaleString('pt-BR', {minimumFractionDigits:2})}</b></div>
                        <div class="stat-row"><span style="color:#888;">Lucro Limpo:</span> <b style="color:var(--green)">R$ ${statsMensal[mes].l.toLocaleString('pt-BR', {minimumFractionDigits:2})}</b></div>
                    </div>`;
                });
                document.getElementById('corpo-estatisticas').innerHTML = htmlStats || "<p style='text-align:center; opacity:0.5;'>Sem dados.</p>";

                // Processar Produtos (Estoque e PDV)
                let htmlE = ''; let htmlPDV = '';
                if (produtos) {
                    produtos.forEach(p => {
                        const id = p.id, n = p.nome, nS = n.replace(/'/g, "\\'"), pr = parseFloat(p.preco||0), cus = parseFloat(p.custo||0), e = p.estoque || 0, f1 = p.foto_1;
                        const desc = (p.descricao || '').replace(/'/g, "\\'").replace(/\n/g, "\\n");
                        const teor = (p.teor_alcoolico || '').replace(/'/g, "\\'");
                        const harm = (p.harmonizacao || '').replace(/'/g, "\\'");
                        
                        htmlE += `<div class="estoque-row"><div style="display:flex; justify-content:space-between; align-items:center;"><b>${n}</b><button onclick="abrirEdicao('${id}','${nS}',${pr},${cus},'${desc}','${teor}','${harm}')" style="background:transparent; border:none; font-size:1.5rem; padding:10px; cursor:pointer;">✏️</button></div><div class="estoque-controles"><button class="btn-step" onclick="stepStock('${id}', -1)">−</button><div class="estoque-val-display" id="st-display-${id}">${e}</div><button class="btn-step" onclick="stepStock('${id}', 1)">+</button></div></div>`;
                        
                        htmlPDV += `<div class="pdv-card">
                            <button class="btn-edit-product" onclick="abrirEdicao('${id}','${nS}',${pr},${cus},'${desc}','${teor}','${harm}')">✏️</button>
                            <img src="${f1 || 'https://via.placeholder.com/150'}">
                            <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:flex-end;">
                                <div class="pdv-name">${n}</div>
                                <div class="pdv-price">R$ ${pr.toFixed(2)}</div>
                            </div>
                            <button class="pdv-btn-add" onclick="addPDV('${id}', '${nS}', ${pr}, ${cus})">Adicionar</button>
                        </div>`;
                    });
                }
                document.getElementById('corpo-estoque').innerHTML = htmlE; document.getElementById('corpo-pdv-grid').innerHTML = htmlPDV; updatePDVCart();
            } catch (err) { console.error(err); }
        }

        function abrirEdicao(id, n, p, c, desc, teor, harm) { document.getElementById('edit-id').value = id; document.getElementById('edit-nome').value = n; document.getElementById('edit-preco').value = p; document.getElementById('edit-custo').value = c; document.getElementById('edit-descricao').value = desc || ''; document.getElementById('edit-teor').value = teor || ''; document.getElementById('edit-harmonizacao').value = harm || ''; document.getElementById('modal-editar').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        
        async function salvarEdicao() { 
            const id = document.getElementById('edit-id').value;
            const n = document.getElementById('edit-nome').value;
            const p = parseFloat(document.getElementById('edit-preco').value);
            const c = parseFloat(document.getElementById('edit-custo').value);
            const desc = document.getElementById('edit-descricao').value;
            const teor = document.getElementById('edit-teor').value;
            const harm = document.getElementById('edit-harmonizacao').value;
            fecharTodosModais(); showToast("Salvando..."); 
            await db.from('produtos').update({ nome: n, preco: p, custo: c, descricao: desc, teor_alcoolico: teor, harmonizacao: harm }).eq('id', id);
            carregar(); 
        }

        async function cadastrarProduto() { 
            const n = document.getElementById('cad-nome').value;
            const p = parseFloat(document.getElementById('cad-preco').value);
            const c = parseFloat(document.getElementById('cad-custo').value || 0);
            const e = parseInt(document.getElementById('cad-estoque').value || 0);
            const f1 = document.getElementById('cad-foto1').value;
            const f2 = document.getElementById('cad-foto2').value;
            const desc = document.getElementById('cad-descricao').value;
            const teor = document.getElementById('cad-teor').value;
            const harm = document.getElementById('cad-harmonizacao').value;
            
            if(!n || !p) return alert("Erro!"); 
            showToast("Cadastrando..."); 
            
            await db.from('produtos').insert([{
                nome: n, preco: p, custo: c, estoque: e, foto_1: f1, foto_2: f2, descricao: desc, teor_alcoolico: teor, harmonizacao: harm
            }]);
            
            document.getElementById('cad-nome').value = ''; document.getElementById('cad-preco').value = ''; document.getElementById('cad-custo').value = ''; document.getElementById('cad-estoque').value = ''; document.getElementById('cad-foto1').value = ''; document.getElementById('cad-foto2').value = ''; document.getElementById('cad-descricao').value = ''; document.getElementById('cad-teor').value = ''; document.getElementById('cad-harmonizacao').value = '';
            switchTab('tab-estoque'); carregar(); 
        }

        async function excluirProduto(id) { 
            if(!confirm("Excluir para sempre?")) return; 
            fecharTodosModais(); showToast("Excluindo..."); 
            await db.from('produtos').update({ excluido: true }).eq('id', id);
            carregar(); 
        }

        function verDetalhesMes(mesAno) {
            const data = statsMensal[mesAno]; if (!data) return;
            document.getElementById('mes-titulo-detalhe').innerText = `Vendas de ${mesAno}`;
            let html = "<table>";
            data.orders.forEach(p => {
                const dtF = `${formatarData(p.created_at)} <small style="color:#888;">${new Date(p.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;
                const safeData = encodeURIComponent(JSON.stringify(p));
                html += `<tr onclick="abrirPedido('${safeData}')"><td><b>${p.cliente}</b><br><small>${dtF}</small></td><td><b style="color:var(--gold);">R$ ${parseFloat(p.total).toFixed(2)}</b></td></tr>`;
            });
            document.getElementById('corpo-mes-detalhe').innerHTML = html + "</table>";
            document.getElementById('modal-mes-detalhe').style.display = 'flex'; document.getElementById('overlay').style.display = 'block';
        }

        function abrirPedido(safeData) { 
            const p = JSON.parse(decodeURIComponent(safeData));
            sel = p; // Guarda o pedido selecionado
            
            const dtF = formatarDataHora(p.created_at);
            
            let htmlFrete = '<span style="color:#888;">Não registrado</span>';
            if (p.frete !== undefined && p.frete !== null) {
                const freteVal = parseFloat(p.frete);
                if (freteVal === 0) { htmlFrete = '<span style="color:var(--green)">Grátis</span>'; } 
                else { htmlFrete = `R$ ${freteVal.toFixed(2)}`; }
            }
            
            const enderecoOriginal = p.endereco || 'Balcão';
            let htmlEndereco = enderecoOriginal;
            if (enderecoOriginal.toLowerCase() !== 'balcão' && enderecoOriginal.trim() !== '') {
                const urlMaps = `https://maps.google.com/?q=${encodeURIComponent(enderecoOriginal)}`;
                htmlEndereco = `<a href="${urlMaps}" target="_blank" style="color:var(--gold); font-weight:700; text-decoration:none; border-bottom:1px dashed var(--gold); padding-bottom:2px;">${enderecoOriginal} 📍</a>`;
            }

            document.getElementById('m-nome').innerText = p.cliente; 
            document.getElementById('detalhes-pedido').innerHTML = `
                <b>📦 ITENS:</b><br>${p.itens}<br><br>
                <b>💰 PAGTO:</b> ${p.pagamento}<br>
                <b>🚚 LOCAL:</b> ${htmlEndereco}<br><br>
                <b>📦 FRETE:</b> ${htmlFrete}<br>
                <b>⏰ FEITO EM:</b> ${dtF}
                <div style="text-align:right; font-size:1.8rem; font-weight:900; color:var(--gold); margin-top:15px; border-top:1px solid #333; padding-top:15px;">R$ ${parseFloat(p.total).toFixed(2)}</div>`; 
            
            document.getElementById('m-status').value = p.status || "Novo Pedido"; 
            document.getElementById('modal-pedido').style.display = 'block'; 
            document.getElementById('overlay').style.display = 'block'; 
        }

        async function salvarStatus() { 
            const st = document.getElementById('m-status').value; 
            fecharTodosModais(); showToast("Atualizando..."); 
            if (st === "EXCLUIR") {
                await db.from('pedidos').delete().eq('id', sel.id);
            } else {
                await db.from('pedidos').update({ status: st }).eq('id', sel.id);
            }
            carregar(); 
        }

        function addPDV(id, n, p, c) { let i = adminCart.find(x => x.id === id); if(i) i.qtd++; else adminCart.push({id, name: n, price: p, cost: c, qtd:1}); updatePDVCart(); showToast("Na sacola"); }
        function updatePDVCart() {
            const float = document.getElementById('pdv-floating-cart'); if(!float) return;
            if(adminCart.length === 0) { float.style.display = 'none'; fecharTodosModais(); return; }
            if (document.querySelector('.nav-item.active').getAttribute('onclick').includes('tab-pdv')) float.style.display = 'flex';
            let tq = 0, tv = 0;
            document.getElementById('pdv-itens').innerHTML = adminCart.map(i => {
                tq += i.qtd; tv += (i.price * i.qtd);
                return `<div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center; border-bottom: 1px solid #1a1a1a; padding-bottom: 15px;"><div style="flex:1;"><span style="font-weight:700;">${i.name}</span><br><b style="color:var(--gold);">R$ ${(i.price * i.qtd).toFixed(2)}</b></div><div class="estoque-controles" style="height:45px; width:120px; margin-top:0;"><button class="btn-step" style="font-size:1.2rem;" onclick="changePDV('${i.id}', -1)">−</button><span style="width:40px;text-align:center;font-weight:900;">${i.qtd}</span><button class="btn-step" style="font-size:1.2rem;" onclick="changePDV('${i.id}', 1)">+</button></div></div>`;
            }).join('');
            document.getElementById('pdv-float-qtd').innerText = tq; document.getElementById('pdv-float-total').innerText = `R$ ${tv.toFixed(2)}`; document.getElementById('pdv-total').innerText = `Total: R$ ${tv.toFixed(2)}`;
        }
        function changePDV(id, d) { let i = adminCart.find(x => x.id === id); if(i) { i.qtd += d; if(i.qtd <= 0) adminCart = adminCart.filter(x => x.id !== id); } updatePDVCart(); }
        function abrirSacolaPDV() { document.getElementById('modal-sacola-pdv').style.display = 'flex'; document.getElementById('overlay').style.display = 'block'; }
        
        async function finalizarVendaPDV() {
            if(!confirm("Finalizar venda?")) return;
            const fretePdv = parseFloat(document.getElementById('pdv-frete').value || 0);
            const totalProdutos = adminCart.reduce((a, b) => a + (b.price * b.qtd), 0);
            const payload = { 
                cliente: document.getElementById('pdv-cliente').value || "Balcão", 
                itens: adminCart.map(i => `${i.name} (x${i.qtd})`).join(', '), 
                total: parseFloat((totalProdutos + fretePdv).toFixed(2)), 
                custo: parseFloat((adminCart.reduce((a, b) => a + (b.cost * b.qtd), 0)).toFixed(2)), 
                pagamento: document.getElementById('pdv-pagamento').value, 
                status: "Concluído", 
                frete: fretePdv,
                endereco: "Balcão"
            };
            fecharTodosModais(); adminCart = []; updatePDVCart(); showToast("Enviando..."); 
            await db.from('pedidos').insert([payload]);
            carregar();
        }

        async function stepStock(id, d) { 
            const display = document.getElementById(`st-display-${id}`); 
            if(display) { 
                const nv = parseInt(display.innerText) + d; 
                display.innerText = nv; 
                await db.from('produtos').update({ estoque: nv }).eq('id', id);
            } 
        }

        let touchstartX = 0; let touchendX = 0;
        document.body.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        document.body.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleGesture(); }, {passive: true});
        function handleGesture() {
            const deltaX = touchendX - touchstartX;
            if (Math.abs(deltaX) > 80 && document.getElementById('overlay').style.display !== 'block') {
                if (deltaX > 0) { if (document.getElementById('sidebar').classList.contains('active')) toggleMenu(); else if (touchstartX > 60) navigateTabs(-1); }
                else { if (touchstartX > (window.innerWidth - 60)) toggleMenu(); else navigateTabs(1); }
            }
        }
        function navigateTabs(direction) {
            const abas = ['tab-pedidos', 'tab-pdv', 'tab-historico', 'tab-estoque', 'tab-stats', 'tab-cadastro', 'tab-rastreio'];
            const currentId = document.querySelector('.tab-content.active') ? document.querySelector('.tab-content.active').id : 'tab-pedidos';
            const index = abas.indexOf(currentId) + direction;
            if (index >= 0 && index < abas.length) switchTab(abas[index]);
        }

        const abaSalva = localStorage.getItem('abaAtivaTioNan') || 'tab-pedidos';
        switchTab(abaSalva); carregar();

        // --- SISTEMA DE NOTIFICAÇÃO EM TEMPO REAL ---
        db.channel('pedidos_realtime')
          .on(
            'postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'pedidos' },
            (payload) => {
                const p = payload.new;
                // Só notifica se for um pedido novo (evita duplicar PDV que já nasce concluído)
                if (p.status === "Novo Pedido") {
                    showToast(`🔔 NOVO PEDIDO: ${p.cliente.toUpperCase()}! 🥃`);
                    dispararNotificacaoNativa(p.cliente.toUpperCase());
                    try {
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                        audio.play();
                    } catch(e) {}
                    carregar(); // Atualiza a tela na hora
                }
            }
          )
          .subscribe();

        verificarPermissaoNotificacao();
        setInterval(carregar, 120000); // Backup de refresh a cada 2 min
    </script>
</body>
</html>
