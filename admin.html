<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tio Nan Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #070707; --card: #111; --new: #2ecc71; --pend: #f1c40f; --done: #3498db; --canc: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding: 15px; padding-bottom: 90px; }
        
        h1 { color: var(--gold); margin-bottom: 20px; font-weight: 900; text-align: center; font-size: 1.4rem; text-transform: uppercase; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* ABAS */
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #666; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; padding: 5px 10px; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* PEDIDOS */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 12px; background: #181818; border-top: 1px solid #222; border-bottom: 1px solid #222; vertical-align: middle; }
        td:first-child { border-left: 1px solid #222; border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid #222; border-radius: 0 10px 10px 0; text-align: right; }
        
        .status { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.65rem; text-transform: uppercase; color: #000; display: inline-block; margin-bottom: 5px; }
        .status-NovoPedido { background: var(--new); }
        .status-Pendente { background: var(--pend); }
        .status-Concluído { background: var(--done); color: #fff; }
        .status-Cancelado { background: var(--canc); color: #fff; }

        .maps-link { color: #3498db; text-decoration: none; font-size: 0.75rem; font-weight: 700; display: block; margin-top: 6px; }

        #modal, .overlay { display:none; }
        #modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#151515; padding:20px; border:1px solid var(--gold); border-radius:15px; width:92%; z-index:1000; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; }
        .btn-status { width:100%; padding:15px; background:var(--gold); border:none; font-weight: 900; margin-top:15px; border-radius:8px; text-transform: uppercase; color: #000; }

        /* ESTOQUE */
        .estoque-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #181818; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .btn-step { background: #333; color: var(--gold); border: 1px solid var(--gold); width: 45px; height: 45px; font-weight: bold; border-radius: 8px; font-size: 1.5rem; }
        .estoque-input { background: transparent; border: none; color: #fff; width: 50px; text-align: center; font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>Gestão Tio Nan</h1>

    <div class="card">
        <div class="tab-container">
            <button class="tab-btn active" onclick="mudarAba('ativos', this)">Ativos</button>
            <button class="tab-btn" onclick="mudarAba('arquivados', this)">Arquivados</button>
            <button class="tab-btn" onclick="mudarAba('estoque', this)">Estoque</button>
        </div>
        
        <div id="secao-pedidos">
            <table><tbody id="corpo-pedidos"></tbody></table>
        </div>

        <div id="secao-estoque" style="display:none">
            <div id="corpo-estoque"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="fechar()"></div>
    <div id="modal">
        <h2 id="m-nome" style="border:none; color:var(--gold); font-size:1.2rem"></h2>
        <div id="m-detalhes" style="font-size: 0.85rem; margin: 15px 0; color: #ccc;"></div>
        <div id="m-controle-status">
            <select id="m-status" style="width:100%; padding:15px; background:#222; color:#fff; border:1px solid #444; border-radius:8px; font-weight: bold;">
                <option value="Novo Pedido">Novo Pedido</option>
                <option value="Pendente">Pendente</option>
                <option value="Concluído">Concluído</option>
                <option value="Cancelado">Cancelado</option>
            </select>
            <button onclick="salvarStatus()" class="btn-status">Atualizar Agora</button>
        </div>
    </div>

    <script>
        const urlWebhook = "https://script.google.com/macros/s/AKfycbwu4OWF-2JEsWZl3fw7qpevre0rSeN7hGUJZUPWwx-Jt50kzJ7QinlfOepG5ARQC5WG/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let abaAtual = 'ativos';
        let sel = null;

        function mudarAba(aba, btn) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('secao-pedidos').style.display = (aba === 'estoque') ? 'none' : 'block';
            document.getElementById('secao-estoque').style.display = (aba === 'estoque') ? 'block' : 'none';
            
            carregar();
        }

        async function carregar() {
            if (abaAtual === 'estoque') {
                const resP = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0&t=${Date.now()}`);
                const rowsP = (await resP.text()).split('\n').slice(1);
                let htmlE = '';
                rowsP.forEach(row => {
                    const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                    if(!c[1]) return;
                    htmlE += `<div class="estoque-row"><b>${c[1]}</b><div style="display:flex; align-items:center; gap:10px;"><button class="btn-step" onclick="stepStock('${c[0]}', -1)">-</button><input type="number" id="st-${c[0]}" class="estoque-input" value="${c[4]}" onchange="salvarEstoque('${c[0]}')"><button class="btn-step" onclick="stepStock('${c[0]}', 1)">+</button></div></div>`;
                });
                document.getElementById('corpo-estoque').innerHTML = htmlE;
                return;
            }

            let rows = [];
            if (abaAtual === 'ativos') {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1901875162&t=${Date.now()}`);
                rows = (await res.text()).split('\n').slice(1).reverse();
            } else {
                const res = await fetch(`${urlWebhook}?action=getArquivados`);
                rows = await res.json();
                rows.reverse();
            }

            let htmlV = '';
            rows.forEach((row, i) => {
                const c = Array.isArray(row) ? row : row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                
                const status = c[6];
                const statusClasse = status.replace(/\s/g, '');
                const endereco = c[7] || "";
                const linkMaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;

                htmlV += `
                <tr>
                    <td onclick='abrirPedido(${JSON.stringify(c)}, ${rows.length - i})'>
                        <b>${c[1]}</b><br>
                        <small style="color:#777">${c[2].substring(0,30)}...</small>
                        ${endereco ? `<a href="${linkMaps}" target="_blank" class="maps-link" onclick="event.stopPropagation();">📍 Abrir Maps</a>` : ''}
                    </td>
                    <td style="text-align:right" onclick='abrirPedido(${JSON.stringify(c)}, ${rows.length - i})'>
                        <span class="status status-${statusClasse}">${status}</span><br><b>R$ ${c[3]}</b>
                    </td>
                </tr>`;
            });
            document.getElementById('corpo-pedidos').innerHTML = htmlV || '<p style="text-align:center; padding:20px; color:#666">Nada por aqui.</p>';
        }

        function abrirPedido(dados, linha) {
            sel = { linha, dados };
            document.getElementById('m-nome').innerText = dados[1];
            document.getElementById('m-detalhes').innerHTML = `<b>Itens:</b> ${dados[2]}<br><b>Endereço:</b> ${dados[7]}<br><b>Pagamento:</b> ${dados[5]}<br><b>Total:</b> R$ ${dados[3]}`;
            document.getElementById('m-status').value = dados[6];
            
            // Esconde controle de status se já estiver arquivado
            document.getElementById('m-controle-status').style.display = (abaAtual === 'arquivados') ? 'none' : 'block';
            
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        async function salvarStatus() {
            const status = document.getElementById('m-status').value;
            fechar();
            await fetch(`${urlWebhook}?action=updateStatus&row=${sel.linha}&status=${encodeURIComponent(status)}`);
            carregar();
        }

        function stepStock(id, delta) { 
            const inp = document.getElementById(`st-${id}`); 
            inp.value = parseInt(inp.value) + delta; 
            salvarEstoque(id); 
        }
        
        async function salvarEstoque(id) { 
            const val = document.getElementById(`st-${id}`).value;
            fetch(`${urlWebhook}?action=updateStock&id=${id}&stock=${val}`);
        }

        function fechar() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        
        carregar();
    </script>
</body>
</html>
