<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tio Nan Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #070707; --card: #111; --new-green: #2ecc71; --done-blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding: 15px; }
        h1 { color: var(--gold); margin-bottom: 20px; font-weight: 900; text-align: center; font-size: 1.5rem; text-transform: uppercase; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        h2 { color: var(--gold); text-transform: uppercase; font-size: 0.9rem; font-weight: 900; }
        
        /* Botão de Limpar Pedidos */
        .btn-limpar { background: #222; color: var(--gold); border: 1px solid #333; padding: 6px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-limpar:disabled { opacity: 0.5; }

        .estoque-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #181818; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; }
        .btn-step { background: #333; color: var(--gold); border: none; width: 35px; height: 35px; font-weight: bold; border-radius: 5px; }
        .estoque-input { background: transparent; border: none; color: #fff; width: 40px; text-align: center; font-weight: 900; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 12px; background: #181818; border-top: 1px solid #222; border-bottom: 1px solid #222; font-size: 0.8rem; }
        td:first-child { border-left: 1px solid #222; border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid #222; border-radius: 0 10px 10px 0; text-align: right; }
        
        .status-novo { border-left: 4px solid var(--new-green) !important; }
        .status { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; }
        .Novo { background: var(--new-green); color: #000; }
        .Concluído { background: var(--done-blue); color: #fff; }
        .Cancelado { background: #ff4444; color: #fff; }

        #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#151515; padding:25px; border:1px solid var(--gold); border-radius:15px; width:90%; z-index:1000; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; }
        .btn-status { width:100%; padding:15px; background:var(--gold); border:none; font-weight: 900; margin-top:10px; border-radius:8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Gestão Tio Nan</h1>

    <div class="card">
        <div class="header-section"><h2>📦 Estoque</h2></div>
        <div id="corpo-estoque"></div>
    </div>

    <div class="card">
        <div class="header-section">
            <h2>🛒 Pedidos</h2>
            <button onclick="arquivar()" id="btn-arq" class="btn-limpar">Limpar Histórico</button>
        </div>
        <table><tbody id="corpo-pedidos"></tbody></table>
    </div>

    <div class="overlay" id="overlay" onclick="fechar()"></div>
    <div id="modal">
        <h2 id="m-nome"></h2>
        <div style="margin: 15px 0; font-size: 0.85rem; color: #ccc;" id="m-itens"></div>
        <select id="m-status" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444; border-radius:8px;">
            <option value="Novo Pedido">Novo Pedido</option>
            <option value="Pendente">Pendente</option>
            <option value="Concluído">Concluído</option>
            <option value="Cancelado">Cancelado</option>
        </select>
        <button onclick="salvarStatus()" class="btn-status">Atualizar Status</button>
    </div>

    <script>
        // COLOQUE AQUI O SEU LINK ATUALIZADO DO GOOGLE APPS SCRIPT
        const urlWebhook = "https://script.google.com/macros/s/AKfycbwu4OWF-2JEsWZl3fw7qpevre0rSeN7hGUJZUPWwx-Jt50kzJ7QinlfOepG5ARQC5WG/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let sel = null;

        async function carregar() {
            const resV = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1901875162&t=${Date.now()}`);
            const textV = await resV.text();
            const rowsV = textV.split('\n').slice(1);
            let htmlV = '';
            rowsV.reverse().forEach((row, i) => {
                const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                const isNovo = c[6] === "Novo Pedido";
                htmlV += `<tr class="${isNovo?'status-novo':''}" onclick='abrirPedido(${JSON.stringify(c)}, ${rowsV.length-i})'>
                    <td><b>${c[1]}</b><br><small>${c[0].split(' ')[0]}</small></td>
                    <td><span class="status ${c[6].split(' ')[0]}">${c[6]}</span><br><b>R$ ${c[3]}</b></td>
                </tr>`;
            });
            document.getElementById('corpo-pedidos').innerHTML = htmlV;

            const resP = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0&t=${Date.now()}`);
            const rowsP = (await resP.text()).split('\n').slice(1);
            let htmlE = '';
            rowsP.forEach(row => {
                const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                htmlE += `<div class="estoque-row"><div><b>${c[1]}</b></div><div><button class="btn-step" onclick="stepStock('${c[0]}', -1)">-</button> <input type="number" id="st-${c[0]}" class="estoque-input" value="${c[4]}" onchange="salvarEstoque('${c[0]}')"> <button class="btn-step" onclick="stepStock('${c[0]}', 1)">+</button></div></div>`;
            });
            document.getElementById('corpo-estoque').innerHTML = htmlE;
        }

        async function arquivar() {
            if(!confirm("Deseja mover pedidos finalizados para a aba de arquivo?")) return;
            const btn = document.getElementById('btn-arq');
            btn.innerText = "LIMPANDO...";
            btn.disabled = true;
            await fetch(`${urlWebhook}?action=arquivar`);
            alert("Painel limpo com sucesso!");
            carregar();
            btn.innerText = "Limpar Histórico";
            btn.disabled = false;
        }

        function stepStock(id, delta) { 
            const inp = document.getElementById(`st-${id}`); 
            inp.value = parseInt(inp.value) + delta; 
            salvarEstoque(id); 
        }
        
        async function salvarEstoque(id) { 
            const val = document.getElementById(`st-${id}`).value;
            fetch(`${urlWebhook}?action=updateStock&id=${id}&stock=${val}`);
        }

        function abrirPedido(dados, linha) {
            sel = { linha, dados };
            document.getElementById('m-nome').innerText = dados[1];
            document.getElementById('m-itens').innerText = dados[2];
            document.getElementById('m-status').value = dados[6];
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function fechar() { document.getElementById('modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

        async function salvarStatus() {
            const status = document.getElementById('m-status').value;
            fechar();
            await fetch(`${urlWebhook}?action=updateStatus&row=${sel.linha}&status=${status}`);
            carregar();
        }

        carregar();
        setInterval(carregar, 30000);
    </script>
</body>
</html>
