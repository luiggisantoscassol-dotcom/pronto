<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tio Nan Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #121212; --new: #2ecc71; --pend: #f1c40f; --done: #3498db; --canc: #e74c3c; --text-dim: #bbb; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding: 20px; padding-bottom: 100px; }
        
        h1 { color: var(--gold); margin-bottom: 25px; font-weight: 900; text-align: center; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: #555; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; padding: 10px; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .secao-conteudo { display: none; }
        .secao-conteudo.ativa { display: block; }

        .pedido-card { background: var(--card); border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; display: flex; align-items: stretch; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .pedido-check { width: 45px; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        .pedido-info { flex: 1; padding: 15px; }
        .pedido-info b { font-size: 1.15rem; color: #fff; text-transform: uppercase; }
        .pedido-detalhe { font-size: 0.95rem; color: #999; margin: 4px 0; }
        .pedido-data { font-size: 0.85rem; color: #eee; font-weight: 600; margin-top: 4px; display: block; }
        
        .status-area { padding: 15px; text-align: right; display: flex; flex-direction: column; justify-content: center; min-width: 105px; }
        .status { padding: 5px 8px; border-radius: 4px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; color: #000; margin-bottom: 6px; }
        .status-NovoPedido { background: var(--new); }
        .status-Pendente { background: var(--pend); }
        .status-Concluído { background: var(--done); color: #fff; }
        .status-Cancelado { background: var(--canc); color: #fff; }

        .estoque-item { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .btn-step { background: #222; color: var(--gold); border: 1px solid var(--gold); width: 48px; height: 48px; font-weight: bold; border-radius: 10px; font-size: 1.5rem; }
        .estoque-input { background: transparent; border: none; color: #fff; width: 55px; text-align: center; font-weight: 900; font-size: 1.3rem; }

        #modal, .overlay { display:none; }
        #modal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#000; padding:25px; border:1px solid var(--gold); border-radius:20px; width:92%; z-index:1000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:999; backdrop-filter: blur(8px); }
        
        #bulk-bar { display: none; position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 25px; border-radius: 50px; font-weight: 900; z-index: 2000; width: 90%; justify-content: space-between; align-items: center; box-shadow: 0 8px 25px #000; }
        #bulk-bar button { background: #000; color: #fff; border: none; padding: 10px 18px; border-radius: 20px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Tio Nan Admin</h1>

    <div class="tab-container">
        <button class="tab-btn active" data-aba="ativos" onclick="mudarAba('ativos')">📦 Ativos</button>
        <button class="tab-btn" data-aba="arquivados" onclick="mudarAba('arquivados')">📁 Histórico</button>
        <button class="tab-btn" data-aba="estoque" onclick="mudarAba('estoque')">🍯 Estoque</button>
    </div>
    
    <div id="secao-ativos" class="secao-conteudo ativa"><div id="corpo-ativos"></div></div>
    <div id="secao-arquivados" class="secao-conteudo"><div id="corpo-arquivados"></div></div>
    <div id="secao-estoque" class="secao-conteudo"><div id="corpo-estoque"></div></div>

    <div id="bulk-bar">
        <span id="bulk-count">0 SELECIONADOS</span>
        <button onclick="mudarVariosStatus()">ALTERAR STATUS</button>
    </div>

    <div class="overlay" id="overlay" onclick="fechar()"></div>
    <div id="modal">
        <h2 id="m-nome" style="color:var(--gold); margin-bottom:15px; text-transform: uppercase; font-size: 1.3rem;"></h2>
        <div id="m-detalhes" style="font-size: 1rem; margin-bottom: 20px; color: #ddd; line-height: 1.6;"></div>
        <div id="m-controle">
            <select id="m-status" style="width:100%; padding:18px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:12px; font-weight: 900; font-size: 1rem;">
                <option value="Novo Pedido">Novo Pedido</option>
                <option value="Pendente">Pendente</option>
                <option value="Concluído">Concluído</option>
                <option value="Cancelado">Cancelado</option>
            </select>
            <button onclick="salvarStatus()" style="width:100%; padding:18px; background:var(--gold); border:none; font-weight:900; margin-top:20px; border-radius:12px; text-transform:uppercase; color:#000;">Atualizar Pedido</button>
        </div>
    </div>

    <script>
        const urlWebhook = "https://script.google.com/macros/s/AKfycbwu4OWF-2JEsWZl3fw7qpevre0rSeN7hGUJZUPWwx-Jt50kzJ7QinlfOepG5ARQC5WG/exec";
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        let abaAtual = 'ativos';
        let sel = null;

        function mudarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.aba === aba));
            document.querySelectorAll('.secao-conteudo').forEach(sec => sec.classList.toggle('ativa', sec.id === 'secao-' + aba));
            document.getElementById('bulk-bar').style.display = 'none';
            carregar();
        }

        async function carregar() {
            try {
                if (abaAtual === 'ativos') {
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1901875162&cache=` + Date.now());
                    const rows = (await res.text()).split('\n').slice(1).reverse();
                    renderizar(rows, 'corpo-ativos', true);
                } else if (abaAtual === 'arquivados') {
                    const res = await fetch(`${urlWebhook}?action=getArquivados&cache=` + Date.now());
                    const rows = await res.json();
                    renderizar(rows.reverse(), 'corpo-arquivados', false);
                } else if (abaAtual === 'estoque') {
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=0&cache=` + Date.now());
                    const rows = (await res.text()).split('\n').slice(1);
                    renderizarEstoque(rows);
                }
            } catch (e) { console.error(e); }
        }

        function renderizar(rows, containerId, editavel) {
            let html = '';
            rows.forEach((row, i) => {
                const c = Array.isArray(row) ? row : row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(v => v.replace(/"/g,''));
                if(!c[1]) return;
                const statusClasse = c[6].replace(/\s/g, '');
                html += `
                <div class="pedido-card">
                    ${editavel ? `<div class="pedido-check"><input type="checkbox" class="check-ped" style="width:22px; height:22px" value="${rows.length - i}" onchange="toggleBulk()"></div>` : ''}
                    <div class="pedido-info" onclick='abrirPedido(${JSON.stringify(c)}, ${rows.length - i}, ${editavel})'>
                        <b>${c[1]}</b>
                        <div class="pedido-detalhe">${c[2].substring(0,40)}...</div>
                        <span class="pedido-data">📅 ${c[0]}</span>
                    </div>
                    <div class="status-area">
                        <span class="status status-${statusClasse}">${c[6]}</span>
                        <b style="color:var(--gold); font-size: 1.1rem;">R$ ${c[3]}</b>
                    </div>
                </div>`;
            });
            document.getElementById(containerId).innerHTML = html || '<p style="text-align:center; padding:20px; color:#444">Nada encontrado.</p>';
        }

        function renderizarEstoque(rows) {
            let html = '';
            rows.forEach(row => {
                const c = row.match(/(".*
